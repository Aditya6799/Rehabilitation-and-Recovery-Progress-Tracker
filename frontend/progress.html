<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Track and monitor rehabilitation progress with detailed logs and visual charts."
    />
    <title>Precision Recovery | Progress Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #0059bb;
        --primary-container: #0070ea;
        --primary-fixed: #d8e2ff;
        --primary-fixed-dim: #adc7ff;
        --on-primary: #fff;
        --secondary: #405e96;
        --secondary-container: #a4c1ff;
        --tertiary: #9e3d00;
        --tertiary-container: #c64f00;
        --tertiary-fixed: #ffdbcc;
        --surface: #f7f9fc;
        --surface-container: #eceef1;
        --surface-container-low: #f2f4f7;
        --surface-container-lowest: #fff;
        --surface-container-high: #e6e8eb;
        --surface-container-highest: #e0e3e6;
        --on-surface: #191c1e;
        --on-surface-variant: #414754;
        --outline: #717786;
        --outline-variant: #c1c6d7;
        --error: #ba1a1a;
        --error-container: #ffdad6;
        --font-headline: "Manrope", sans-serif;
        --font-body: "Inter", sans-serif;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-xl: 16px;
        --radius-2xl: 24px;
        --radius-full: 9999px;
        --shadow-sm: 0 2px 8px rgba(0, 89, 187, 0.04);
        --shadow-md: 0 4px 16px rgba(0, 89, 187, 0.06);
        --shadow-lg: 0 8px 32px rgba(0, 89, 187, 0.08);
        --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      body.dark {
        --primary: #adc7ff;
        --primary-container: #004493;
        --primary-fixed: #d8e2ff;
        --primary-fixed-dim: #adc7ff;
        --on-primary: #002e6b;
        --secondary: #adc7ff;
        --secondary-container: #26467c;
        --tertiary: #ffb695;
        --tertiary-container: #7c2e00;
        --tertiary-fixed: #ffdbcc;
        --surface: #111416;
        --surface-container: #1d2022;
        --surface-container-low: #191c1e;
        --surface-container-lowest: #0c0f11;
        --surface-container-high: #272a2d;
        --surface-container-highest: #323538;
        --on-surface: #e0e3e6;
        --on-surface-variant: #c1c6d7;
        --outline: #8b91a1;
        --outline-variant: #414754;
        --error: #ffb4ab;
        --error-container: #93000a;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.35);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-body);
        background: var(--surface);
        color: var(--on-surface);
        transition:
          background var(--transition),
          color var(--transition);
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      .app-layout {
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: 260px;
        background: var(--surface-container-low);
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        z-index: 50;
        transition: transform var(--transition);
      }
      .sidebar-header {
        padding: 24px 24px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sidebar-logo-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-container)
        );
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 18px;
      }
      .sidebar-logo-text {
        font-family: var(--font-headline);
        font-weight: 700;
        font-size: 1.1rem;
      }
      .sidebar-nav {
        flex: 1;
        padding: 8px 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .sidebar-link {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-radius: var(--radius-md);
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--on-surface-variant);
        transition: all var(--transition);
        cursor: pointer;
        border: none;
        background: transparent;
        width: 100%;
        text-align: left;
        font-family: var(--font-body);
      }
      .sidebar-link:hover {
        background: var(--surface-container);
        color: var(--on-surface);
      }
      .sidebar-link.active {
        background: var(--primary-fixed);
        color: var(--primary);
        font-weight: 600;
      }
      body.dark .sidebar-link.active {
        background: var(--primary-container);
        color: var(--primary-fixed-dim);
      }
      .sidebar-link-icon {
        font-size: 18px;
        width: 24px;
        text-align: center;
      }
      .sidebar-divider {
        height: 1px;
        background: var(--outline-variant);
        opacity: 0.3;
        margin: 12px 16px;
      }
      .sidebar-footer {
        padding: 16px 12px;
      }
      .sidebar-user {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-radius: var(--radius-md);
        background: var(--surface-container);
      }
      .sidebar-avatar {
        width: 36px;
        height: 36px;
        border-radius: var(--radius-full);
        background: linear-gradient(
          135deg,
          var(--primary-fixed-dim),
          var(--primary-fixed)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.8rem;
        color: var(--primary);
      }
      .sidebar-user-name {
        font-size: 0.82rem;
        font-weight: 600;
      }
      .sidebar-user-role {
        font-size: 0.7rem;
        color: var(--on-surface-variant);
        text-transform: capitalize;
      }
      .sidebar-logout-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 11px 16px;
        margin-top: 12px;
        border: none;
        border-radius: var(--radius-md);
        background: var(--error-container);
        color: var(--error);
        font-family: var(--font-body);
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition);
      }
      .sidebar-logout-btn:hover {
        filter: brightness(0.92);
        transform: translateY(-1px);
        box-shadow: var(--shadow-sm);
      }
      body.dark .sidebar-logout-btn {
        background: rgba(255, 180, 171, 0.1);
        color: #ef9a9a;
      }
      body.dark .sidebar-logout-btn:hover {
        background: rgba(255, 180, 171, 0.18);
      }
      .main-content {
        flex: 1;
        margin-left: 260px;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      .topbar {
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surface);
        position: sticky;
        top: 0;
        z-index: 40;
      }
      .topbar-left h1 {
        font-family: var(--font-headline);
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .topbar-left p {
        font-size: 0.8rem;
        color: var(--on-surface-variant);
        margin-top: 2px;
      }
      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar-btn {
        width: 40px;
        height: 40px;
        border-radius: var(--radius-full);
        background: var(--surface-container);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: var(--on-surface-variant);
        transition: all var(--transition);
      }
      .topbar-btn:hover {
        background: var(--surface-container-high);
        color: var(--primary);
      }
      .mobile-toggle {
        display: none;
      }
      .content {
        flex: 1;
        padding: 0 32px 32px;
      }
      .page-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border: none;
        border-radius: var(--radius-md);
        font-family: var(--font-body);
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition);
      }
      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-container)
        );
        color: #fff;
        box-shadow: var(--shadow-sm);
      }
      body.dark .btn-primary {
        color: #0a1628;
      }
      .btn-primary:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-1px);
      }

      .progress-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .card {
        background: var(--surface-container-lowest);
        border-radius: var(--radius-xl);
        padding: 28px;
        overflow: hidden;
      }
      .card-full {
        grid-column: 1 / -1;
      }
      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      .card-title {
        font-family: var(--font-headline);
        font-size: 1.05rem;
        font-weight: 600;
      }

      .chart-container {
        position: relative;
        height: 250px;
      }
      .chart-container canvas {
        width: 100% !important;
        height: 100% !important;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group.full {
        grid-column: 1 / -1;
      }
      .form-label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--on-surface);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .form-input,
      .form-select,
      .form-textarea {
        width: 100%;
        padding: 12px 14px;
        border: 2px solid transparent;
        border-radius: var(--radius-md);
        font-family: var(--font-body);
        font-size: 0.85rem;
        background: var(--surface-container-high);
        color: var(--on-surface);
        transition: all var(--transition);
        outline: none;
      }
      .form-input:focus,
      .form-select:focus,
      .form-textarea:focus {
        background: var(--surface-container-lowest);
        border-color: rgba(0, 89, 187, 0.3);
        box-shadow: 0 0 0 4px rgba(0, 89, 187, 0.08);
      }
      body.dark .form-input:focus,
      body.dark .form-select:focus,
      body.dark .form-textarea:focus {
        border-color: rgba(173, 199, 255, 0.3);
        box-shadow: 0 0 0 4px rgba(173, 199, 255, 0.08);
      }
      .form-select {
        appearance: none;
        cursor: pointer;
      }
      .form-textarea {
        resize: vertical;
        min-height: 80px;
      }

      .range-group {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .range-group input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 6px;
        border-radius: 3px;
        background: var(--surface-container-high);
        outline: none;
      }
      .range-group input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--primary);
        cursor: pointer;
        box-shadow: var(--shadow-sm);
      }
      .range-value {
        font-family: var(--font-headline);
        font-size: 1.3rem;
        font-weight: 700;
        min-width: 44px;
        text-align: center;
        color: var(--primary);
      }

      .mood-selector {
        display: flex;
        gap: 10px;
      }
      .mood-option {
        flex: 1;
        padding: 12px;
        text-align: center;
        border: 2px solid var(--outline-variant);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all var(--transition);
        font-size: 1.3rem;
      }
      .mood-option:hover {
        border-color: var(--primary);
      }
      .mood-option.active {
        border-color: var(--primary);
        background: var(--primary-fixed);
      }
      body.dark .mood-option.active {
        background: var(--primary-container);
      }
      .mood-option span {
        display: block;
        font-size: 0.65rem;
        margin-top: 4px;
        color: var(--on-surface-variant);
      }
      .mood-option input {
        display: none;
      }
      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--on-surface-variant);
        padding: 12px 16px;
        text-align: left;
      }
      td {
        padding: 14px 16px;
        font-size: 0.82rem;
      }
      tr + tr td {
        border-top: 1px solid rgba(193, 198, 215, 0.12);
      }
      tr:hover td {
        background: var(--surface-container-low);
      }
      .pain-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
      }
      .pain-low {
        background: #43a047;
      }
      .pain-mid {
        background: #fb8c00;
      }
      .pain-high {
        background: #e53935;
      }
      .patient-selector {
        margin-bottom: 24px;
      }
      .patient-selector select {
        padding: 10px 16px;
        border-radius: var(--radius-md);
        border: 2px solid var(--outline-variant);
        background: var(--surface-container-lowest);
        color: var(--on-surface);
        font-family: var(--font-body);
        font-size: 0.85rem;
        outline: none;
        min-width: 240px;
      }
      .toast-container {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .toast {
        padding: 14px 20px;
        border-radius: var(--radius-md);
        font-size: 0.85rem;
        font-weight: 500;
        box-shadow: var(--shadow-lg);
        animation: slideIn 0.3s ease;
        max-width: 380px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .toast.success {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .toast.error {
        background: var(--error-container);
        color: var(--error);
      }
      body.dark .toast.success {
        background: #1b3a1e;
        color: #66bb6a;
      }
      body.dark .toast.error {
        background: #3c1111;
        color: #ef9a9a;
      }
      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--on-surface-variant);
      }
      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 12px;
        opacity: 0.3;
      }

      @media (max-width: 1024px) {
        .progress-grid {
          grid-template-columns: 1fr;
        }
        .form-grid {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 768px) {
        .sidebar {
          transform: translateX(-100%);
        }
        .sidebar.open {
          transform: translateX(0);
        }
        .main-content {
          margin-left: 0;
        }
        .mobile-toggle {
          display: flex;
        }
        .topbar {
          padding: 12px 20px;
        }
        .content {
          padding: 0 20px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo-icon">⚕</div>
          <span class="sidebar-logo-text">Precision Recovery</span>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-divider"></div>
        <div class="sidebar-footer">
          <div class="sidebar-user">
            <div class="sidebar-avatar" id="sidebarAvatar">--</div>
            <div>
              <div class="sidebar-user-name" id="sidebarName">Loading...</div>
              <div class="sidebar-user-role" id="sidebarRole">—</div>
            </div>
          </div>
          <button class="sidebar-logout-btn" id="logoutBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign Out
          </button>
        </div>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="topbar-btn mobile-toggle"
              id="mobileToggle"
              aria-label="Toggle sidebar"
            >
              ☰
            </button>
            <h1>Progress Tracking</h1>
            <p id="pageSubtitle">Monitor your recovery journey</p>
          </div>
          <div class="topbar-actions">
            <button
              class="topbar-btn"
              id="themeToggle"
              aria-label="Toggle dark mode"
            >
              🌙
            </button>
          </div>
        </header>
        <div class="content" id="pageContent"></div>
      </main>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <script>
      const API_BASE = window.location.origin + "/api";
      function getToken() {
        return localStorage.getItem("token");
      }
      function getUser() {
        try {
          return JSON.parse(localStorage.getItem("user"));
        } catch {
          return null;
        }
      }
      async function api(endpoint, options = {}) {
        const token = getToken();
        const config = {
          headers: {
            "Content-Type": "application/json",
            ...(token ? { Authorization: `Bearer ${token}` } : {}),
          },
          ...options,
        };
        const res = await fetch(`${API_BASE}${endpoint}`, config);
        const data = await res.json();
        if (res.status === 401) {
          localStorage.removeItem("token");
          localStorage.removeItem("user");
          window.location.href = "login.html";
          return;
        }
        if (!res.ok) throw new Error(data.error || "Request failed");
        return data;
      }
      function showToast(msg, type = "error") {
        const c = document.getElementById("toastContainer");
        const t = document.createElement("div");
        t.className = `toast ${type}`;
        t.innerHTML = `${type === "success" ? "✓" : "⚠"} ${msg}`;
        c.appendChild(t);
        setTimeout(() => {
          t.style.opacity = "0";
          setTimeout(() => t.remove(), 300);
        }, 4000);
      }
      function formatDate(d) {
        return new Date(d).toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric",
        });
      }

      const token = getToken();
      const user = getUser();
      if (!token || !user) window.location.href = "login.html";

      // Theme
      (function () {
        if (localStorage.getItem("theme") === "dark") {
          document.body.classList.add("dark");
          document.getElementById("themeToggle").textContent = "☀️";
        }
      })();
      document.getElementById("themeToggle").addEventListener("click", () => {
        document.body.classList.toggle("dark");
        const d = document.body.classList.contains("dark");
        localStorage.setItem("theme", d ? "dark" : "light");
        document.getElementById("themeToggle").textContent = d ? "☀️" : "🌙";
      });

      // Sidebar
      function renderSidebar() {
        const nav = document.getElementById("sidebarNav");
        const pLinks = [
          { icon: "📊", label: "Dashboard", href: "dashboard.html" },
          { icon: "📈", label: "Progress", href: "progress.html" },
          { icon: "🏋️", label: "Exercises", href: "exercises.html" },
          { icon: "📅", label: "Appointments", href: "appointments.html" },
          { icon: "👤", label: "Profile", href: "profile.html" },
        ];
        const dLinks = [
          { icon: "📊", label: "Dashboard", href: "dashboard.html" },
          { icon: "👥", label: "Patients", href: "progress.html" },
          { icon: "🏋️", label: "Exercises", href: "exercises.html" },
          { icon: "📅", label: "Appointments", href: "appointments.html" },
          { icon: "👤", label: "Profile", href: "profile.html" },
        ];
        const links = user.role === "doctor" ? dLinks : pLinks;
        const cur = window.location.pathname.split("/").pop();
        nav.innerHTML = links
          .map(
            (l) =>
              `<a class="sidebar-link ${cur === l.href ? "active" : ""}" href="${l.href}"><span class="sidebar-link-icon">${l.icon}</span>${l.label}</a>`,
          )
          .join("");
        document.getElementById("sidebarAvatar").textContent = user.name
          ? user.name
              .split(" ")
              .map((w) => w[0])
              .join("")
              .toUpperCase()
              .slice(0, 2)
          : "--";
        document.getElementById("sidebarName").textContent = user.name;
        document.getElementById("sidebarRole").textContent = user.role;
      }
      renderSidebar();
      document
        .getElementById("mobileToggle")
        .addEventListener("click", () =>
          document.getElementById("sidebar").classList.toggle("open"),
        );
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        window.location.href = "login.html";
      });

      // Load page
      async function loadPage() {
        const content = document.getElementById("pageContent");
        if (user.role === "patient") renderPatientProgress(content);
        else renderDoctorProgress(content);
      }
      async function renderPatientProgress(container) {
        container.innerHTML = `
        <div class="page-actions">
          <div></div>
          <button class="btn btn-primary" id="addLogBtn">＋ Log Today's Session</button>
        </div>
        <div class="progress-grid">
          <div class="card card-full">
            <div class="card-header"><div class="card-title">Recovery Trend</div></div>
            <div class="chart-container"><canvas id="progressChart"></canvas></div>
          </div>
          <div class="card card-full" id="logFormCard" style="display:none;">
            <div class="card-header"><div class="card-title">Log Daily Session</div></div>
            <form id="progressForm" class="form-grid">
              <div class="form-group">
                <label class="form-label">Date</label>
                <input type="date" class="form-input" id="logDate" value="${new Date().toISOString().split("T")[0]}">
              </div>
              <div class="form-group">
                <label class="form-label">Pain Level</label>
                <div class="range-group">
                  <input type="range" min="0" max="10" value="3" id="painLevel" oninput="document.getElementById('painVal').textContent=this.value">
                  <div class="range-value" id="painVal">3</div>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Exercise Completion %</label>
                <div class="range-group">
                  <input type="range" min="0" max="100" value="75" id="completion" oninput="document.getElementById('compVal').textContent=this.value+'%'">
                  <div class="range-value" id="compVal">75%</div>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Mood</label>
                <div class="mood-selector" id="moodSelector">
                  <div class="mood-option" onclick="selectMood('great',this)">😄<span>Great</span><input type="radio" name="mood" value="great"></div>
                  <div class="mood-option" onclick="selectMood('good',this)">🙂<span>Good</span><input type="radio" name="mood" value="good"></div>
                  <div class="mood-option active" onclick="selectMood('okay',this)">😐<span>Okay</span><input type="radio" name="mood" value="okay" checked></div>
                  <div class="mood-option" onclick="selectMood('bad',this)">😟<span>Bad</span><input type="radio" name="mood" value="bad"></div>
                  <div class="mood-option" onclick="selectMood('terrible',this)">😢<span>Terrible</span><input type="radio" name="mood" value="terrible"></div>
                </div>
              </div>
              <div class="form-group full">
                <label class="form-label">Notes (Optional)</label>
                <textarea class="form-textarea" id="logNotes" placeholder="How did today's session go?"></textarea>
              </div>
              <div class="form-group full" style="text-align:right;">
                <button type="button" class="btn" style="background:var(--surface-container);color:var(--on-surface-variant);margin-right:8px;" onclick="document.getElementById('logFormCard').style.display='none'">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Progress</button>
              </div>
            </form>
          </div>
          <div class="card card-full">
            <div class="card-header"><div class="card-title">Progress History</div></div>
            <div class="table-wrap" id="progressTable"><div class="empty-state"><div class="empty-state-icon">📊</div><p>Loading progress data...</p></div></div>
          </div>
        </div>
      `;

        document.getElementById("addLogBtn").addEventListener("click", () => {
          document.getElementById("logFormCard").style.display = "block";
          document
            .getElementById("logFormCard")
            .scrollIntoView({ behavior: "smooth" });
        });

        document
          .getElementById("progressForm")
          .addEventListener("submit", async (e) => {
            e.preventDefault();
            try {
              await api("/progress", {
                method: "POST",
                body: JSON.stringify({
                  date: document.getElementById("logDate").value,
                  painLevel: parseInt(
                    document.getElementById("painLevel").value,
                  ),
                  exerciseCompletion: parseInt(
                    document.getElementById("completion").value,
                  ),
                  mood: document.querySelector('input[name="mood"]:checked')
                    .value,
                  notes: document.getElementById("logNotes").value,
                }),
              });
              showToast("Progress logged!", "success");
              document.getElementById("logFormCard").style.display = "none";
              loadProgressData();
            } catch (err) {
              showToast(err.message);
            }
          });

        loadProgressData();
      }

      let selectedMood = "okay";
      function selectMood(mood, el) {
        selectedMood = mood;
        document
          .querySelectorAll(".mood-option")
          .forEach((o) => o.classList.remove("active"));
        el.classList.add("active");
        el.querySelector("input").checked = true;
      }

      async function loadProgressData() {
        try {
          const data = await api(`/progress/${user.id}`);
          renderProgressTable(data);
          drawProgressChart(data.slice().reverse());
        } catch (err) {
          document.getElementById("progressTable").innerHTML =
            '<div class="empty-state"><div class="empty-state-icon">📊</div><p>No progress data yet. Log your first session!</p></div>';
        }
      }

      function renderProgressTable(data) {
        if (!data || data.length === 0) {
          document.getElementById("progressTable").innerHTML =
            '<div class="empty-state"><div class="empty-state-icon">📊</div><p>No progress entries yet.</p></div>';
          return;
        }
        const moodEmoji = {
          great: "😄",
          good: "🙂",
          okay: "😐",
          bad: "😟",
          terrible: "😢",
        };
        document.getElementById("progressTable").innerHTML =
          `<table><thead><tr><th>Date</th><th>Pain</th><th>Completion</th><th>Mood</th><th>Notes</th></tr></thead><tbody>${data.map((p) => `<tr><td>${formatDate(p.date)}</td><td><span class="pain-dot ${p.painLevel <= 3 ? "pain-low" : p.painLevel <= 6 ? "pain-mid" : "pain-high"}"></span>${p.painLevel}/10</td><td>${p.exerciseCompletion}%</td><td>${moodEmoji[p.mood] || "😐"} ${p.mood}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.notes || "—"}</td></tr>`).join("")}</tbody></table>`;
      }

      function drawProgressChart(data) {
        const canvas = document.getElementById("progressChart");
        if (!canvas || data.length < 2) return;
        const ctx = canvas.getContext("2d");
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        const W = rect.width,
          H = rect.height,
          pad = { top: 20, right: 20, bottom: 30, left: 40 };
        const cW = W - pad.left - pad.right,
          cH = H - pad.top - pad.bottom;
        const vals = data.map((p) => p.exerciseCompletion);
        const painVals = data.map((p) => p.painLevel * 10);
        ctx.strokeStyle = getComputedStyle(document.body)
          .getPropertyValue("--outline-variant")
          .trim();
        ctx.globalAlpha = 0.15;
        ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i++) {
          const y = pad.top + (cH / 4) * i;
          ctx.beginPath();
          ctx.moveTo(pad.left, y);
          ctx.lineTo(W - pad.right, y);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
        const primary = getComputedStyle(document.body)
          .getPropertyValue("--primary")
          .trim();
        // Completion line
        ctx.beginPath();
        vals.forEach((v, i) => {
          const x = pad.left + (cW / (vals.length - 1)) * i;
          const y = pad.top + cH - (v / 100) * cH;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.strokeStyle = primary;
        ctx.lineWidth = 2.5;
        ctx.lineJoin = "round";
        ctx.stroke();
        // Pain line
        ctx.beginPath();
        painVals.forEach((v, i) => {
          const x = pad.left + (cW / (painVals.length - 1)) * i;
          const y = pad.top + cH - (v / 100) * cH;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.strokeStyle = getComputedStyle(document.body)
          .getPropertyValue("--tertiary")
          .trim();
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
        // Labels
        ctx.font = `11px Inter,sans-serif`;
        ctx.fillStyle = getComputedStyle(document.body)
          .getPropertyValue("--on-surface-variant")
          .trim();
        ctx.textAlign = "center";
        const step = Math.max(1, Math.floor(data.length / 6));
        data.forEach((p, i) => {
          if (i % step === 0 || i === data.length - 1) {
            const x = pad.left + (cW / (data.length - 1)) * i;
            ctx.fillText(
              new Date(p.date).toLocaleDateString("en-US", {
                month: "short",
                day: "numeric",
              }),
              x,
              H - 8,
            );
          }
        });
        // Legend
        ctx.font = "bold 11px Inter,sans-serif";
        ctx.fillStyle = primary;
        ctx.textAlign = "left";
        ctx.fillText("— Completion %", pad.left, pad.top - 4);
        ctx.fillStyle = getComputedStyle(document.body)
          .getPropertyValue("--tertiary")
          .trim();
        ctx.fillText("- - Pain Level (×10)", pad.left + 120, pad.top - 4);
      }
      async function renderDoctorProgress(container) {
        document.getElementById("pageSubtitle").textContent =
          "View patient progress data";
        container.innerHTML = `
        <div class="patient-selector">
          <label class="form-label">Select Patient</label>
          <select id="patientSelect"><option value="">Loading patients...</option></select>
        </div>
        <div class="progress-grid">
          <div class="card card-full"><div class="card-header"><div class="card-title">Patient Progress Trend</div></div><div class="chart-container"><canvas id="progressChart"></canvas></div></div>
          <div class="card card-full"><div class="card-header"><div class="card-title">Progress History</div></div><div class="table-wrap" id="progressTable"><div class="empty-state"><div class="empty-state-icon">👥</div><p>Select a patient to view their progress.</p></div></div></div>
        </div>
      `;
        try {
          const patients = await api("/patients");
          const sel = document.getElementById("patientSelect");
          sel.innerHTML =
            '<option value="">— Select a patient —</option>' +
            patients
              .map(
                (p) =>
                  `<option value="${p._id}">${p.name} (${p.email})</option>`,
              )
              .join("");
          sel.addEventListener("change", async () => {
            if (!sel.value) return;
            try {
              const data = await api(`/progress/${sel.value}`);
              renderProgressTable(data);
              drawProgressChart(data.slice().reverse());
            } catch (err) {
              showToast(err.message);
            }
          });
        } catch (err) {
          showToast("Failed to load patients");
        }
      }

      loadPage();
    </script>
  </body>
</html>
