<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Browse and manage rehabilitation exercises. Doctors create protocols, patients view and complete assigned exercises." />
  <title>Precision Recovery | Exercises</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
    <link rel="stylesheet" href="css/exercises.css" />
  </head>

<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo-icon">⚕</div>
        <span class="sidebar-logo-text">Precision Recovery</span>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-divider"></div>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebarAvatar">--</div>
          <div>
            <div class="sidebar-user-name" id="sidebarName">Loading...</div>
            <div class="sidebar-user-role" id="sidebarRole">—</div>
          </div>
        </div>
        <button class="sidebar-logout-btn" id="logoutBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Sign Out
        </button>
      </div>
    </aside>
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="topbar-btn mobile-toggle" id="mobileToggle" aria-label="Toggle sidebar">
            ☰
          </button>
          <h1>Exercise Library</h1>
          <p id="pageSubtitle">Browse and manage rehabilitation exercises</p>
        </div>
        <div class="topbar-actions">
          <button class="topbar-btn" id="themeToggle" aria-label="Toggle dark mode">
            🌙
          </button>
        </div>
      </header>
      <div class="content">
        <div class="page-actions">
          <div class="filter-bar" id="filterBar">
            <button class="filter-chip active" onclick="filterExercises('all', this)">
              All
            </button>
            <button class="filter-chip" onclick="filterExercises('stretching', this)">
              Stretching
            </button>
            <button class="filter-chip" onclick="filterExercises('strengthening', this)">
              Strengthening
            </button>
            <button class="filter-chip" onclick="filterExercises('balance', this)">
              Balance
            </button>
            <button class="filter-chip" onclick="filterExercises('cardio', this)">
              Cardio
            </button>
            <button class="filter-chip" onclick="filterExercises('flexibility', this)">
              Flexibility
            </button>
            <button class="filter-chip" onclick="filterExercises('mobility', this)">
              Mobility
            </button>
          </div>
          <div id="doctorActions"></div>
        </div>
        <div class="exercises-grid" id="exercisesGrid">
          <div class="empty-state">
            <div class="empty-state-icon">🏋️</div>
            <p>Loading exercises...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Create/Edit Modal -->
  <div class="modal-overlay" id="exerciseModal">
    <div class="modal">
      <h3 id="modalTitle">Create Exercise</h3>
      <p>Define a new rehabilitation exercise protocol.</p>
      <form id="exerciseForm">
        <div class="form-group">
          <label class="form-label">Exercise Title</label>
          <input type="text" class="form-input" id="exTitle" placeholder="e.g., Quad Stretch" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-select" id="exCategory">
              <option value="stretching">Stretching</option>
              <option value="strengthening">Strengthening</option>
              <option value="balance">Balance</option>
              <option value="cardio">Cardio</option>
              <option value="flexibility">Flexibility</option>
              <option value="mobility">Mobility</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Duration (minutes)</label>
            <input type="number" class="form-input" id="exDuration" min="1" value="15" required />
          </div>
          <div class="form-group">
            <label class="form-label">Days to Complete</label>
            <input type="number" class="form-input" id="exDaysToComplete" min="1" value="7" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Difficulty</label>
          <select class="form-select" id="exDifficulty">
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Instructions</label>
          <textarea class="form-textarea" id="exInstructions" placeholder="Step-by-step instructions..."
            required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Video URL (YouTube)</label>
          <input type="url" class="form-input" id="exVideoUrl" placeholder="https://www.youtube.com/watch?v=..." />
        </div>
        <div class="form-group" id="assignGroup" style="display:none;">
          <label class="form-label">Assign To Patients (Ctrl+Click for multiple. Leave empty for Global)</label>
          <select class="form-select" id="exAssignedTo" multiple style="height: 100px;"></select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">
            Cancel
          </button>
          <button type="submit" class="btn btn-primary" id="modalSubmitBtn">
            Create Exercise
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

    <script src="js/exercises.js"></script>
  </body>

</html>
