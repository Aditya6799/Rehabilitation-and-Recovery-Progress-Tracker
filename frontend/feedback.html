<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Actionable recovery feedback from your healthcare provider." />
  <title>Precision Recovery | Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --primary: #0059bb;
      --primary-container: #0070ea;
      --primary-fixed: #d8e2ff;
      --primary-fixed-dim: #adc7ff;
      --on-primary: #fff;
      --secondary: #405e96;
      --secondary-container: #a4c1ff;
      --tertiary: #9e3d00;
      --tertiary-container: #c64f00;
      --tertiary-fixed: #ffdbcc;
      --surface: #f7f9fc;
      --surface-container: #eceef1;
      --surface-container-low: #f2f4f7;
      --surface-container-lowest: #fff;
      --surface-container-high: #e6e8eb;
      --surface-container-highest: #e0e3e6;
      --on-surface: #191c1e;
      --on-surface-variant: #414754;
      --outline: #717786;
      --outline-variant: #c1c6d7;
      --error: #ba1a1a;
      --error-container: #ffdad6;
      --font-headline: "Manrope", sans-serif;
      --font-body: "Inter", sans-serif;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-2xl: 24px;
      --radius-full: 9999px;
      --shadow-sm: 0 2px 8px rgba(0, 89, 187, 0.06);
      --shadow-md: 0 4px 16px rgba(0, 89, 187, 0.08);
      --shadow-lg: 0 8px 32px rgba(0, 89, 187, 0.10);
      --transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body.dark {
      --primary: #adc7ff;
      --primary-container: #004493;
      --primary-fixed: #d8e2ff;
      --primary-fixed-dim: #adc7ff;
      --on-primary: #002e6b;
      --secondary: #adc7ff;
      --secondary-container: #26467c;
      --tertiary: #ffb695;
      --tertiary-container: #7c2e00;
      --tertiary-fixed: #ffdbcc;
      --surface: #111416;
      --surface-container: #1d2022;
      --surface-container-low: #191c1e;
      --surface-container-lowest: #1c2128;
      --surface-container-high: #272a2d;
      --surface-container-highest: #323538;
      --on-surface: #e0e3e6;
      --on-surface-variant: #c1c6d7;
      --outline: #8b91a1;
      --outline-variant: #414754;
      --error: #ffb4ab;
      --error-container: #93000a;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.35);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--surface);
      color: var(--on-surface);
      transition: background var(--transition), color var(--transition);
    }

    a { text-decoration: none; color: inherit; }

    .app-layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 260px;
      background: linear-gradient(135deg, #41658A, #2D4662);
      color: #ffffff;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; bottom: 0; left: 0;
      z-index: 50;
      transition: transform var(--transition);
    }

    body.dark .sidebar {
      background: linear-gradient(135deg, #2D4662, #1B2A3E);
    }

    .sidebar-header {
      padding: 24px 24px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo-icon {
      width: 36px; height: 36px;
      background: #ffffff;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      color: #41658A; font-size: 18px;
    }

    .sidebar-logo-text {
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: 1.1rem;
      color: #ffffff;
    }

    .sidebar-nav {
      flex: 1;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-link {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 0.875rem; font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
      transition: all var(--transition);
      cursor: pointer; border: none;
      background: transparent;
      width: 100%; text-align: left;
      font-family: var(--font-body);
    }

    .sidebar-link:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      transform: translateX(6px);
    }

    .sidebar-link.active {
      background: #ffffff;
      color: #41658A;
      font-weight: 600;
    }

    body.dark .sidebar-link.active {
      background: #ffffff;
      color: #41658A;
    }

    .sidebar-link-icon { font-size: 18px; width: 24px; text-align: center; }

    .sidebar-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.2);
      opacity: 1;
      margin: 12px 16px;
    }

    .sidebar-footer { padding: 16px 12px; }

    .sidebar-user {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.1);
    }

    .sidebar-avatar {
      width: 36px; height: 36px;
      border-radius: var(--radius-full);
      background: #ffffff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem;
      color: #41658A;
    }

    .sidebar-user-name { font-size: 0.82rem; font-weight: 600; color: #ffffff; }
    .sidebar-user-role { font-size: 0.7rem; color: rgba(255, 255, 255, 0.7); text-transform: capitalize; }

    .sidebar-logout-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 11px 16px; margin-top: 12px;
      border: none; border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.1); color: #ffb4ab;
      font-family: var(--font-body);
      font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all var(--transition);
    }

    .sidebar-logout-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .main-content {
      flex: 1; margin-left: 260px;
      display: flex; flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface);
      position: sticky; top: 0; z-index: 40;
    }

    .topbar-left h1 {
      font-family: var(--font-headline);
      font-size: 1.5rem; font-weight: 700;
      letter-spacing: -0.02em;
    }

    .topbar-left p { font-size: 0.8rem; color: var(--on-surface-variant); margin-top: 2px; }

    .topbar-actions { display: flex; align-items: center; gap: 12px; }

    .topbar-btn {
      width: 40px; height: 40px;
      border-radius: var(--radius-full);
      background: var(--surface-container);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--on-surface-variant);
      transition: all var(--transition);
    }

    .topbar-btn:hover { background: var(--surface-container-high); color: var(--primary); transform: rotate(8deg) scale(1.1); }

    .mobile-toggle { display: none; }

    .content { flex: 1; padding: 0 32px 32px; }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all var(--transition);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-container));
      color: #fff; box-shadow: var(--shadow-sm);
    }

    body.dark .btn-primary { color: #0a1628; }

    .btn-primary:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

    .btn-sm { padding: 8px 14px; font-size: 0.78rem; }

    .btn-ghost { background: var(--surface-container); color: var(--on-surface-variant); }
    .btn-ghost:hover { background: var(--surface-container-high); }

    /* ---- Page Actions ---- */
    .page-actions {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }

    /* ---- Feedback Cards ---- */
    .feedback-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
    }

    .feedback-card {
      background: var(--surface-container-lowest);
      border-radius: var(--radius-xl);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease backwards;
    }

    .feedback-card:nth-child(2) { animation-delay: 0.06s; }
    .feedback-card:nth-child(3) { animation-delay: 0.12s; }
    .feedback-card:nth-child(4) { animation-delay: 0.18s; }

    .feedback-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .feedback-card.unread {
      border-left: 4px solid var(--primary);
    }

    .feedback-card-header {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .feedback-author {
      display: flex; align-items: center; gap: 10px;
    }

    .feedback-author-avatar {
      width: 38px; height: 38px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--primary-fixed-dim), var(--primary-fixed));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.75rem;
      color: var(--primary);
    }

    .feedback-author-name { font-weight: 600; font-size: 0.88rem; }
    .feedback-author-spec { font-size: 0.72rem; color: var(--on-surface-variant); }

    .feedback-badge {
      font-size: 0.65rem; padding: 4px 10px;
      border-radius: var(--radius-full);
      font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .badge-high     { background: #fce4ec; color: #c62828; }
    .badge-medium   { background: #fff3e0; color: #e65100; }
    .badge-low      { background: #e8f5e9; color: #2e7d32; }
    .badge-milestone  { background: #ede7f6; color: #4527a0; }
    .badge-exercise   { background: #e3f2fd; color: #1565c0; }
    .badge-pain-management { background: #fce4ec; color: #c62828; }
    .badge-general    { background: var(--surface-container); color: var(--on-surface-variant); }
    .badge-motivation { background: #fff8e1; color: #f57f17; }

    body.dark .badge-high   { background: #3c1111; color: #ef9a9a; }
    body.dark .badge-medium { background: #3b2500; color: #ffb74d; }
    body.dark .badge-low    { background: #1b3a1e; color: #66bb6a; }
    body.dark .badge-milestone { background: #1a0e33; color: #b39ddb; }
    body.dark .badge-exercise  { background: #0d2137; color: #90caf9; }
    body.dark .badge-pain-management { background: #3c1111; color: #ef9a9a; }
    body.dark .badge-general   { background: var(--surface-container-high); color: var(--on-surface-variant); }
    body.dark .badge-motivation { background: #332b00; color: #ffe082; }

    .feedback-content {
      font-size: 0.88rem; line-height: 1.6;
      color: var(--on-surface);
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    .feedback-date {
      font-size: 0.7rem;
      color: var(--on-surface-variant);
      margin-bottom: 12px;
    }

    .feedback-steps {
      background: var(--surface-container);
      border-radius: var(--radius-md);
      padding: 14px;
      margin-bottom: 14px;
    }

    .feedback-steps-title {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .step-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 0;
      font-size: 0.82rem;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    .step-item + .step-item {
      border-top: 1px solid rgba(193, 198, 215, 0.12);
    }

    .step-checkbox {
      width: 20px; height: 20px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--outline-variant);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
      transition: all var(--transition);
      font-size: 12px;
    }

    .step-item.completed .step-checkbox {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .step-item.completed .step-text {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .feedback-actions {
      display: flex; gap: 8px;
      margin-top: 8px;
    }

    .unread-badge {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--primary);
      position: absolute;
      top: 16px; right: 16px;
    }

    .feedback-patient-tag {
      font-size: 0.72rem;
      color: var(--on-surface-variant);
      margin-bottom: 8px;
    }

    /* ---- Doctor Form ---- */
    .doctor-form-card {
      background: var(--surface-container-lowest);
      border-radius: var(--radius-xl);
      padding: 28px;
      margin-bottom: 24px;
    }

    .doctor-form-card h3 {
      font-family: var(--font-headline);
      font-size: 1.1rem; font-weight: 700;
      margin-bottom: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group { margin-bottom: 16px; }
    .form-group.full { grid-column: 1 / -1; }

    .form-label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: var(--on-surface); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 12px 14px;
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 0.85rem;
      background: var(--surface-container-high);
      color: var(--on-surface);
      transition: all var(--transition);
      outline: none;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      background: var(--surface-container-lowest);
      border-color: rgba(0, 89, 187, 0.3);
      box-shadow: 0 0 0 4px rgba(0, 89, 187, 0.08);
    }

    body.dark .form-input:focus, body.dark .form-select:focus, body.dark .form-textarea:focus {
      border-color: rgba(173, 199, 255, 0.3);
      box-shadow: 0 0 0 4px rgba(173, 199, 255, 0.08);
    }

    .form-select { appearance: none; cursor: pointer; }
    .form-textarea { resize: vertical; min-height: 100px; }

    .steps-builder { margin-bottom: 16px; }

    .step-input-row {
      display: flex; gap: 8px; margin-bottom: 8px;
    }

    .step-input-row input {
      flex: 1; padding: 10px 14px;
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 0.85rem;
      background: var(--surface-container-high);
      color: var(--on-surface);
      outline: none;
      transition: all var(--transition);
    }

    .step-input-row input:focus {
      background: var(--surface-container-lowest);
      border-color: rgba(0, 89, 187, 0.3);
    }

    .step-remove-btn {
      width: 36px; height: 36px;
      border: none; border-radius: var(--radius-md);
      background: var(--error-container); color: var(--error);
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }

    .step-remove-btn:hover { filter: brightness(0.9); }

    .add-step-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border: 2px dashed var(--outline-variant);
      border-radius: var(--radius-md);
      background: transparent; color: var(--on-surface-variant);
      font-family: var(--font-body);
      font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: all var(--transition);
    }

    .add-step-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ---- Filter Tabs ---- */
    .filter-tabs {
      display: flex; gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .filter-tab {
      padding: 8px 16px;
      border-radius: var(--radius-full);
      border: 1px solid var(--outline-variant);
      background: transparent;
      color: var(--on-surface-variant);
      font-family: var(--font-body);
      font-size: 0.78rem; font-weight: 500;
      cursor: pointer; transition: all var(--transition);
    }

    .filter-tab:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .filter-tab.active {
      background: var(--primary);
      color: var(--on-primary);
      border-color: var(--primary);
    }

    /* ---- Toast ---- */
    .toast-container {
      position: fixed; top: 24px; right: 24px;
      z-index: 1000;
      display: flex; flex-direction: column; gap: 8px;
    }

    .toast {
      padding: 14px 20px; border-radius: var(--radius-md);
      font-size: 0.85rem; font-weight: 500;
      box-shadow: var(--shadow-lg);
      animation: slideIn 0.3s ease;
      max-width: 380px;
      display: flex; align-items: center; gap: 10px;
    }

    .toast.success { background: #e8f5e9; color: #2e7d32; }
    .toast.error   { background: var(--error-container); color: var(--error); }
    body.dark .toast.success { background: #1b3a1e; color: #66bb6a; }
    body.dark .toast.error   { background: #3c1111; color: #ef9a9a; }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }

    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--on-surface-variant);
    }

    .empty-state-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.3; }
    .empty-state p { font-size: 0.9rem; }

    /* ---- Responsive ---- */
    @media (max-width: 1024px) {
      .feedback-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .mobile-toggle { display: flex; }
      .topbar { padding: 12px 20px; }
      .content { padding: 0 20px 20px; }
    }

    /* ---- Entrance Animations ---- */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-32px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.88); }
      to { opacity: 1; transform: scale(1); }
    }
    .sidebar { animation: slideInLeft 0.5s cubic-bezier(0.22, 1, 0.36, 1) backwards; }
    .topbar-left { animation: fadeInUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) 0.08s backwards; }
    .content { animation: fadeInUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.12s backwards; }
    .doctor-form-card { animation: scaleIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.15s backwards; }
    .filter-tabs { animation: fadeInUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) 0.1s backwards; }
  </style>
</head>

<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo-icon">⚕</div>
        <span class="sidebar-logo-text">Precision Recovery</span>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-divider"></div>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebarAvatar">--</div>
          <div>
            <div class="sidebar-user-name" id="sidebarName">Loading...</div>
            <div class="sidebar-user-role" id="sidebarRole">—</div>
          </div>
        </div>
        <button class="sidebar-logout-btn" id="logoutBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign Out
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="topbar-btn mobile-toggle" id="mobileToggle" aria-label="Toggle sidebar">☰</button>
          <h1>Feedback</h1>
          <p id="pageSubtitle">Actionable recovery guidance</p>
        </div>
        <div class="topbar-actions">
          <button class="topbar-btn" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
        </div>
      </header>
      <div class="content" id="pageContent"></div>
    </main>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const API_BASE = window.location.origin + "/api";
    function getToken() { return localStorage.getItem("token"); }
    function getUser() { try { return JSON.parse(localStorage.getItem("user")); } catch { return null; } }

    async function api(endpoint, options = {}) {
      const token = getToken();
      const config = {
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
        },
        ...options,
      };
      const res = await fetch(`${API_BASE}${endpoint}`, config);
      const data = await res.json();
      if (res.status === 401) {
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        window.location.href = "login.html";
        return;
      }
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    function showToast(msg, type = "error") {
      const c = document.getElementById("toastContainer");
      const t = document.createElement("div");
      t.className = `toast ${type}`;
      t.innerHTML = `${type === "success" ? "✓" : "⚠"} ${msg}`;
      c.appendChild(t);
      setTimeout(() => { t.style.opacity = "0"; setTimeout(() => t.remove(), 300); }, 4000);
    }

    function formatDate(d) {
      return new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    const token = getToken();
    const user = getUser();
    if (!token || !user) window.location.href = "login.html";

    // Theme
    (function () {
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        document.getElementById("themeToggle").textContent = "☀️";
      }
    })();
    document.getElementById("themeToggle").addEventListener("click", () => {
      document.body.classList.toggle("dark");
      const d = document.body.classList.contains("dark");
      localStorage.setItem("theme", d ? "dark" : "light");
      document.getElementById("themeToggle").textContent = d ? "☀️" : "🌙";
    });

    // Sidebar
    function renderSidebar() {
      const nav = document.getElementById("sidebarNav");
      const pLinks = [
        { icon: "📊", label: "Dashboard", href: "dashboard.html" },
        { icon: "📈", label: "Progress", href: "progress.html" },
        { icon: "🏋️", label: "Exercises", href: "exercises.html" },
        { icon: "📅", label: "Appointments", href: "appointments.html" },
        { icon: "📝", label: "Feedback", href: "feedback.html" },
        { icon: "👤", label: "Profile", href: "profile.html" },
      ];
      const dLinks = [
        { icon: "📊", label: "Dashboard", href: "dashboard.html" },
        { icon: "👥", label: "Patients", href: "progress.html" },
        { icon: "🏋️", label: "Exercises", href: "exercises.html" },
        { icon: "📅", label: "Appointments", href: "appointments.html" },
        { icon: "📝", label: "Feedback", href: "feedback.html" },
        { icon: "👤", label: "Profile", href: "profile.html" },
      ];
      const links = user.role === "doctor" ? dLinks : pLinks;
      const cur = window.location.pathname.split("/").pop();
      nav.innerHTML = links.map(
        (l) => `<a class="sidebar-link ${cur === l.href ? "active" : ""}" href="${l.href}"><span class="sidebar-link-icon">${l.icon}</span>${l.label}</a>`
      ).join("");
      document.getElementById("sidebarAvatar").textContent = user.name
        ? user.name.split(" ").map((w) => w[0]).join("").toUpperCase().slice(0, 2)
        : "--";
      document.getElementById("sidebarName").textContent = user.name;
      document.getElementById("sidebarRole").textContent = user.role;
    }
    renderSidebar();
    document.getElementById("mobileToggle").addEventListener("click", () =>
      document.getElementById("sidebar").classList.toggle("open")
    );
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    });

    // ---- Main Logic ----
    let allFeedback = [];
    let patients = [];
    let stepCount = 1;

    async function init() {
      const content = document.getElementById("pageContent");
      if (user.role === "doctor") {
        await loadPatients();
        content.innerHTML = renderDoctorView();
        setupDoctorForm();
      } else {
        content.innerHTML = `
          <div class="filter-tabs" id="filterTabs">
            <button class="filter-tab active" onclick="filterFeedback('all', this)">All</button>
            <button class="filter-tab" onclick="filterFeedback('unread', this)">🔵 Unread</button>
            <button class="filter-tab" onclick="filterFeedback('milestone', this)">🏆 Milestones</button>
            <button class="filter-tab" onclick="filterFeedback('exercise', this)">🏋️ Exercise</button>
            <button class="filter-tab" onclick="filterFeedback('motivation', this)">💪 Motivation</button>
          </div>
          <div class="feedback-grid" id="feedbackGrid"></div>
        `;
      }
      await loadFeedback();
    }

    async function loadPatients() {
      try {
        patients = await api("/patients");
      } catch (err) {
        console.error(err);
      }
    }

    async function loadFeedback() {
      try {
        allFeedback = await api("/feedback");
        renderFeedback(allFeedback);
      } catch (err) {
        document.getElementById("feedbackGrid").innerHTML =
          '<div class="empty-state"><div class="empty-state-icon">📝</div><p>Failed to load feedback.</p></div>';
      }
    }

    function renderDoctorView() {
      return `
        <div class="doctor-form-card">
          <h3>✉️ Send Actionable Feedback</h3>
          <form id="feedbackForm">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Patient</label>
                <select class="form-select" id="fbPatient" required>
                  <option value="">Select a patient…</option>
                  ${patients.map(p => `<option value="${p._id}">${p.name} (${p.email})</option>`).join("")}
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Category</label>
                <select class="form-select" id="fbCategory">
                  <option value="general">General</option>
                  <option value="milestone">Milestone</option>
                  <option value="exercise">Exercise</option>
                  <option value="pain-management">Pain Management</option>
                  <option value="motivation">Motivation</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Priority</label>
                <select class="form-select" id="fbPriority">
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                  <option value="low">Low</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Feedback Message</label>
              <textarea class="form-textarea" id="fbContent" placeholder="Write actionable recovery feedback for the patient…" required></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Actionable Steps (Recovery Milestones)</label>
              <div class="steps-builder" id="stepsBuilder">
                <div class="step-input-row">
                  <input type="text" placeholder="e.g. Complete 3 sets of stretching daily" class="step-input" />
                  <button type="button" class="step-remove-btn" onclick="removeStep(this)" title="Remove">✕</button>
                </div>
              </div>
              <button type="button" class="add-step-btn" onclick="addStep()">＋ Add another step</button>
            </div>
            <button type="submit" class="btn btn-primary">📩 Send Feedback</button>
          </form>
        </div>

        <h3 style="font-family: var(--font-headline); font-weight: 700; margin-bottom: 16px;">📋 Sent Feedback History</h3>

        <div class="filter-tabs" id="filterTabs">
          <button class="filter-tab active" onclick="filterByPatient('all', this)">All Patients</button>
          ${patients.map(p => `<button class="filter-tab" onclick="filterByPatient('${p._id}', this)">${p.name}</button>`).join("")}
        </div>

        <div class="feedback-grid" id="feedbackGrid"></div>
      `;
    }

    function addStep() {
      const builder = document.getElementById("stepsBuilder");
      const row = document.createElement("div");
      row.className = "step-input-row";
      row.innerHTML = `
        <input type="text" placeholder="e.g. Walk 20 minutes without support" class="step-input" />
        <button type="button" class="step-remove-btn" onclick="removeStep(this)" title="Remove">✕</button>
      `;
      builder.appendChild(row);
    }

    function removeStep(btn) {
      const builder = document.getElementById("stepsBuilder");
      if (builder.children.length > 1) {
        btn.parentElement.remove();
      }
    }

    function setupDoctorForm() {
      document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const patientId = document.getElementById("fbPatient").value;
        const content = document.getElementById("fbContent").value;
        const category = document.getElementById("fbCategory").value;
        const priority = document.getElementById("fbPriority").value;
        const stepInputs = document.querySelectorAll(".step-input");
        const actionableSteps = Array.from(stepInputs).map(i => i.value).filter(v => v.trim());

        if (!patientId) return showToast("Please select a patient.");
        if (!content.trim()) return showToast("Please write feedback content.");

        try {
          await api("/feedback", {
            method: "POST",
            body: JSON.stringify({ patientId, content, actionableSteps, category, priority })
          });
          showToast("Feedback sent successfully!", "success");
          document.getElementById("feedbackForm").reset();
          document.getElementById("stepsBuilder").innerHTML = `
            <div class="step-input-row">
              <input type="text" placeholder="e.g. Complete 3 sets of stretching daily" class="step-input" />
              <button type="button" class="step-remove-btn" onclick="removeStep(this)" title="Remove">✕</button>
            </div>
          `;
          loadFeedback();
        } catch (err) {
          showToast(err.message);
        }
      });
    }

    function renderFeedback(list) {
      const grid = document.getElementById("feedbackGrid");
      if (!list || list.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p>No feedback yet.</p></div>';
        return;
      }

      grid.innerHTML = list.map(fb => {
        const isPatient = user.role === "patient";
        const authorName = fb.doctorId?.name || "Doctor";
        const authorSpec = fb.doctorId?.specialization || "";
        const patientName = fb.patientId?.name || "Patient";
        const initials = authorName.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
        const unreadClass = isPatient && !fb.read ? "unread" : "";
        const unreadDot = isPatient && !fb.read ? '<span class="unread-badge"></span>' : "";

        const stepsHtml = fb.actionableSteps && fb.actionableSteps.length > 0 ? `
          <div class="feedback-steps">
            <div class="feedback-steps-title">📋 Actionable Steps</div>
            ${fb.actionableSteps.map((step, i) => `
              <div class="step-item ${step.completed ? 'completed' : ''}" ${isPatient ? `onclick="toggleStep('${fb._id}', ${i})"` : ""}>
                <div class="step-checkbox">${step.completed ? '✓' : ''}</div>
                <span class="step-text">${step.text}</span>
              </div>
            `).join("")}
          </div>
        ` : "";

        const completedCount = fb.actionableSteps ? fb.actionableSteps.filter(s => s.completed).length : 0;
        const totalSteps = fb.actionableSteps ? fb.actionableSteps.length : 0;
        const progressBar = totalSteps > 0 ? `
          <div style="height: 4px; background: var(--surface-container-high); border-radius: 2px; margin-bottom: 14px; overflow: hidden;">
            <div style="height: 100%; width: ${(completedCount/totalSteps)*100}%; background: linear-gradient(90deg, var(--primary), var(--primary-container)); border-radius: 2px; transition: width 0.5s ease;"></div>
          </div>
          <div style="font-size: 0.7rem; color: var(--on-surface-variant); margin-bottom: 14px;">${completedCount}/${totalSteps} steps completed</div>
        ` : "";

        return `
          <div class="feedback-card ${unreadClass}">
            ${unreadDot}
            <div class="feedback-card-header">
              <div class="feedback-author">
                <div class="feedback-author-avatar">${initials}</div>
                <div>
                  <div class="feedback-author-name">${isPatient ? `Dr. ${authorName}` : `To: ${patientName}`}</div>
                  <div class="feedback-author-spec">${isPatient ? authorSpec : fb.patientId?.email || ""}</div>
                </div>
              </div>
              <div>
                <span class="feedback-badge badge-${fb.priority}">${fb.priority}</span>
                <span class="feedback-badge badge-${fb.category}" style="margin-left:4px">${fb.category}</span>
              </div>
            </div>
            <div class="feedback-date">📅 ${formatDate(fb.createdAt)}</div>
            <div class="feedback-content">${fb.content}</div>
            ${progressBar}
            ${stepsHtml}
            ${isPatient && !fb.read ? `<button class="btn btn-sm btn-ghost" onclick="markRead('${fb._id}')">✓ Mark as Read</button>` : ""}
          </div>
        `;
      }).join("");
    }

    function filterFeedback(type, el) {
      document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
      el.classList.add("active");

      if (type === "all") renderFeedback(allFeedback);
      else if (type === "unread") renderFeedback(allFeedback.filter(f => !f.read));
      else renderFeedback(allFeedback.filter(f => f.category === type));
    }

    function filterByPatient(id, el) {
      document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
      el.classList.add("active");

      if (id === "all") renderFeedback(allFeedback);
      else renderFeedback(allFeedback.filter(f => (f.patientId?._id || f.patientId) === id));
    }

    async function markRead(id) {
      try {
        await api(`/feedback/${id}/read`, { method: "PUT" });
        showToast("Marked as read", "success");
        loadFeedback();
      } catch (err) {
        showToast(err.message);
      }
    }

    async function toggleStep(feedbackId, stepIndex) {
      try {
        await api(`/feedback/${feedbackId}/step/${stepIndex}`, { method: "PUT" });
        loadFeedback();
      } catch (err) {
        showToast(err.message);
      }
    }

    init();
  </script>
</body>
</html>
