<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Your personalized rehabilitation dashboard — track progress, manage exercises, and monitor recovery." />
  <title>Precision Recovery | Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --primary: #0059bb;
      --primary-container: #0070ea;
      --primary-fixed: #d8e2ff;
      --primary-fixed-dim: #adc7ff;
      --on-primary: #fff;
      --secondary: #405e96;
      --secondary-container: #a4c1ff;
      --tertiary: #9e3d00;
      --tertiary-container: #c64f00;
      --tertiary-fixed: #ffdbcc;
      --surface: #f7f9fc;
      --surface-container: #eceef1;
      --surface-container-low: #f2f4f7;
      --surface-container-lowest: #fff;
      --surface-container-high: #e6e8eb;
      --surface-container-highest: #e0e3e6;
      --on-surface: #191c1e;
      --on-surface-variant: #414754;
      --outline: #717786;
      --outline-variant: #c1c6d7;
      --error: #ba1a1a;
      --error-container: #ffdad6;
      --font-headline: "Manrope", sans-serif;
      --font-body: "Inter", sans-serif;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-2xl: 24px;
      --radius-full: 9999px;
      --shadow-sm: 0 2px 8px rgba(0, 89, 187, 0.06);
      --shadow-md: 0 4px 16px rgba(0, 89, 187, 0.08);
      --shadow-lg: 0 8px 32px rgba(0, 89, 187, 0.10);
      --transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    body.dark {
      --primary: #adc7ff;
      --primary-container: #004493;
      --primary-fixed: #d8e2ff;
      --primary-fixed-dim: #adc7ff;
      --on-primary: #002e6b;
      --secondary: #adc7ff;
      --secondary-container: #26467c;
      --tertiary: #ffb695;
      --tertiary-container: #7c2e00;
      --tertiary-fixed: #ffdbcc;
      --surface: #111416;
      --surface-container: #1d2022;
      --surface-container-low: #191c1e;
      --surface-container-lowest: #1c2128;
      --surface-container-high: #272a2d;
      --surface-container-highest: #323538;
      --on-surface: #e0e3e6;
      --on-surface-variant: #c1c6d7;
      --outline: #8b91a1;
      --outline-variant: #414754;
      --error: #ffb4ab;
      --error-container: #93000a;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.35);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--surface);
      color: var(--on-surface);
      transition:
        background var(--transition),
        color var(--transition);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: linear-gradient(135deg, #41658A, #2D4662);
      color: #ffffff;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 50;
      transition: transform var(--transition);
    }

    body.dark .sidebar {
      background: linear-gradient(135deg, #2D4662, #1B2A3E);
    }

    .sidebar-header {
      padding: 24px 24px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo-icon {
      width: 36px;
      height: 36px;
      background: #ffffff;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #41658A;
      font-size: 18px;
    }

    .sidebar-logo-text {
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: 1.1rem;
      color: #ffffff;
    }

    .sidebar-nav {
      flex: 1;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
      transition: all var(--transition);
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-family: var(--font-body);
    }

    .sidebar-link:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      transform: translateX(6px);
    }

    .sidebar-link.active {
      background: #ffffff;
      color: #41658A;
      font-weight: 600;
    }

    body.dark .sidebar-link.active {
      background: #ffffff;
      color: #41658A;
    }

    .sidebar-link-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .sidebar-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.2);
      opacity: 1;
      margin: 12px 16px;
    }

    .sidebar-footer {
      padding: 16px 12px;
    }

    .sidebar-user {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.1);
    }

    .sidebar-avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      color: #41658A;
    }

    .sidebar-user-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: #ffffff;
    }

    .sidebar-user-role {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.7);
      text-transform: capitalize;
    }

    .sidebar-logout-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 11px 16px;
      margin-top: 12px;
      border: none;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.1);
      color: #ffb4ab;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }

    .sidebar-logout-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .main-content {
      flex: 1;
      margin-left: 260px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .topbar-left h1 {
      font-family: var(--font-headline);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .topbar-left p {
      font-size: 0.8rem;
      color: var(--on-surface-variant);
      margin-top: 2px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--surface-container);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--on-surface-variant);
      transition: all var(--transition);
    }

    .topbar-btn:hover {
      background: var(--surface-container-high);
      color: var(--primary);
      transform: rotate(8deg) scale(1.1);
    }

    .mobile-toggle {
      display: none;
    }

    .content {
      flex: 1;
      padding: 0 32px 32px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface-container-lowest);
      border-radius: var(--radius-xl);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      transition: all var(--transition);
    }

    .stat-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .stat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .stat-icon.blue {
      background: var(--primary-fixed);
      color: var(--primary);
    }

    .stat-icon.green {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .stat-icon.orange {
      background: var(--tertiary-fixed);
      color: var(--tertiary);
    }

    .stat-icon.purple {
      background: #f3e8ff;
      color: #7c3aed;
    }

    body.dark .stat-icon.blue {
      background: #1a2744;
    }

    body.dark .stat-icon.green {
      background: #1b3a1e;
      color: #66bb6a;
    }

    body.dark .stat-icon.orange {
      background: #3b1d00;
      color: #ffb695;
    }

    body.dark .stat-icon.purple {
      background: #2d1854;
      color: #b388ff;
    }

    .stat-badge {
      font-size: 0.65rem;
      padding: 3px 8px;
      border-radius: var(--radius-full);
      font-weight: 600;
    }

    .stat-badge.up {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .stat-badge.down {
      background: var(--error-container);
      color: var(--error);
    }

    body.dark .stat-badge.up {
      background: #1b3a1e;
      color: #66bb6a;
    }

    body.dark .stat-badge.down {
      background: #3c1111;
      color: #ef9a9a;
    }

    .stat-value {
      font-family: var(--font-headline);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--on-surface-variant);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    .card {
      background: var(--surface-container-lowest);
      border-radius: var(--radius-xl);
      padding: 28px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: all var(--transition);
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .card-title {
      font-family: var(--font-headline);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .card-action {
      font-size: 0.8rem;
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font-body);
    }

    .card-action:hover {
      text-decoration: underline;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      transition: all var(--transition);
    }

    .list-item:hover {
      background: var(--surface-container);
      transform: translateX(4px);
      padding-left: 8px;
      padding-right: 8px;
      border-radius: var(--radius-md);
    }

    .list-item+.list-item {
      border-top: 1px solid var(--outline-variant);
      border-top-color: rgba(193, 198, 215, 0.15);
    }

    .list-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .list-avatar.blue {
      background: var(--primary-fixed);
      color: var(--primary);
    }

    .list-avatar.green {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .list-avatar.orange {
      background: var(--tertiary-fixed);
      color: var(--tertiary);
    }

    body.dark .list-avatar.blue {
      background: #1a2744;
    }

    body.dark .list-avatar.green {
      background: #1b3a1e;
      color: #66bb6a;
    }

    body.dark .list-avatar.orange {
      background: #3b1d00;
      color: #ffb695;
    }

    .list-info {
      flex: 1;
      min-width: 0;
    }

    .list-info h4 {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-info p {
      font-size: 0.72rem;
      color: var(--on-surface-variant);
    }

    .list-badge {
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 0.68rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    .list-badge.pending {
      background: #fff3e0;
      color: #e65100;
    }

    .list-badge.confirmed {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .list-badge.completed {
      background: var(--primary-fixed);
      color: var(--primary);
    }

    .list-badge.cancelled {
      background: var(--error-container);
      color: var(--error);
    }

    body.dark .list-badge.pending {
      background: #3b2500;
      color: #ffb74d;
    }

    body.dark .list-badge.confirmed {
      background: #1b3a1e;
      color: #66bb6a;
    }

    body.dark .list-badge.completed {
      background: #1a2744;
      color: var(--primary);
    }

    body.dark .list-badge.cancelled {
      background: #3c1111;
      color: #ef9a9a;
    }

    .chart-container {
      position: relative;
      height: 200px;
      margin-top: 16px;
    }

    .chart-container canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--on-surface-variant);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 0.85rem;
    }

    .skeleton {
      background: linear-gradient(90deg,
          var(--surface-container) 25%,
          var(--surface-container-high) 50%,
          var(--surface-container) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-md);
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    .skeleton-text {
      height: 14px;
      margin-bottom: 8px;
    }

    .skeleton-title {
      height: 32px;
      width: 60%;
      margin-bottom: 16px;
    }

    .chatbot-fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 56px;
      height: 56px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg,
          var(--primary),
          var(--primary-container));
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: var(--shadow-lg);
      z-index: 200;
      transition: all var(--transition);
    }

    .chatbot-fab:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 32px rgba(0, 89, 187, 0.2);
    }

    .chatbot-fab .dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--tertiary);
      border: 2px solid var(--surface);
    }

    .chatbot-window {
      position: fixed;
      bottom: 96px;
      right: 28px;
      width: 380px;
      height: 520px;
      background: var(--surface-container-lowest);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-lg);
      z-index: 200;
      display: none;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .chatbot-window.open {
      display: flex;
      animation: chatOpen 0.3s ease;
    }

    @keyframes chatOpen {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .chatbot-header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg,
          var(--primary),
          var(--primary-container));
    }

    .chatbot-header-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #fff;
    }

    .chatbot-header-info h3 {
      font-family: var(--font-headline);
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }

    .chatbot-header-info p {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .chatbot-close {
      margin-left: auto;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: rgba(255, 255, 255, 0.15);
      border: none;
      cursor: pointer;
      color: #fff;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chatbot-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: var(--radius-xl);
      font-size: 0.82rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .chat-bubble.user {
      background: linear-gradient(135deg,
          var(--primary),
          var(--primary-container));
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: var(--radius-sm);
    }

    .chat-bubble.assistant {
      background: var(--surface-container);
      color: var(--on-surface);
      align-self: flex-start;
      border-bottom-left-radius: var(--radius-sm);
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--surface-container);
      border-radius: var(--radius-xl);
      align-self: flex-start;
      border-bottom-left-radius: var(--radius-sm);
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--on-surface-variant);
      animation: blink 1.4s infinite both;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: 0.3;
      }

      40% {
        opacity: 1;
      }
    }

    .chatbot-input {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      background: var(--surface-container-low);
    }

    .chatbot-input input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--surface-container-high);
      color: var(--on-surface);
      font-family: var(--font-body);
      font-size: 0.82rem;
      outline: none;
    }

    .chatbot-input input:focus {
      background: var(--surface-container-lowest);
      box-shadow: 0 0 0 2px rgba(0, 89, 187, 0.15);
    }

    .chatbot-input button {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg,
          var(--primary),
          var(--primary-container));
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: transform var(--transition);
    }

    .chatbot-input button:hover {
      transform: scale(1.05);
    }

    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 14px 20px;
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      animation: slideIn 0.3s ease;
      max-width: 380px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .toast.error {
      background: var(--error-container);
      color: var(--error);
    }

    body.dark .toast.success {
      background: #1b3a1e;
      color: #66bb6a;
    }

    body.dark .toast.error {
      background: #3c1111;
      color: #ef9a9a;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface-container-lowest);
      border-radius: var(--radius-2xl);
      padding: 36px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }

    .modal h3 {
      font-family: var(--font-headline);
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal p {
      font-size: 0.85rem;
      color: var(--on-surface-variant);
      margin-bottom: 24px;
    }

    @media (max-width: 1024px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main-content {
        margin-left: 0;
      }

      .mobile-toggle {
        display: flex;
      }

      .topbar {
        padding: 12px 20px;
      }

      .content {
        padding: 0 20px 20px;
      }

      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }

      .chatbot-window {
        right: 12px;
        left: 12px;
        width: auto;
        bottom: 80px;
      }
    }

    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

      <div class="sidebar-header">

      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-divider"></div>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebarAvatar">--</div>
          <div>
            <div class="sidebar-user-name" id="sidebarName">Loading...</div>

          </div>
        </div>
        <button class="sidebar-logout-btn" id="logoutBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />

            ☰

          <p id="pageSubtitle">Welcome back</p>
        </div>
        <div class="topbar-actions">
          <button class="topbar-btn" id="themeToggle" aria-label="Toggle dark mode">
            🌙
          </button>
        </div>
      </header>
      <div class="content" id="dashboardContent">
        <!-- Stats will be injected here -->
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width: 40%"></div>
          </div>
          <div class="stat-card">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width: 40%"></div>
          </div>
          <div class="stat-card">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width: 40%"></div>
          </div>
          <div class="stat-card">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width: 40%"></div>
          </div>
        </div>
        <div class="cards-grid" id="cardsGrid">
          <div class="card">
            <div class="skeleton skeleton-title"></div>

            <div class="skeleton skeleton-text" style="width: 80%"></div>

          <div class="card">

  <div class="chatbot-window" id="chatbotWindow">

      <div class="chatbot-header-icon">🤖</div>

        <p>Your rehabilitation assistant</p>

      <button class="chatbot-close" id="chatbotClose">✕</button>
    </div>
    <div class="chatbot-messages" id="chatMessages">
      <div class="chat-bubble assistant">
        Hello! 👋 I'm your Recovery AI assistant. Ask me anything about your
        rehabilitation journey — exercises, pain management, or recovery tips!
      </div>
    </div>
    <div class="chatbot-input">
      <input type="text" id="chatInput" placeholder="Ask about your recovery..." autocomplete="off" />
      <button id="chatSend" aria-label="Send message">➤</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // CORE UTILITIES
    const API_BASE = window.location.origin + "/api";

    function getToken() {
      return localStorage.getItem("token");
    }
    function getUser() {
      try {
        return JSON.parse(localStorage.getItem("user"));
      } catch {
        return null;
      }
    }

    async function api(endpoint, options = {}) {
      const token = getToken();
      const config = {
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
        },
        ...options,
      };
      const res = await fetch(`${API_BASE}${endpoint}`, config);
      const data = await res.json();
      if (res.status === 401) {
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        window.location.href = "login.html";
        return;
      }
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    function showToast(msg, type = "error") {
      const c = document.getElementById("toastContainer");
      const t = document.createElement("div");
      t.className = `toast ${type}`;
      t.innerHTML = `${type === "success" ? "✓" : "⚠"} ${msg}`;
      c.appendChild(t);
      setTimeout(() => {
        t.style.opacity = "0";
        setTimeout(() => t.remove(), 300);
      }, 4000);
    }

    function formatDate(d) {
      return new Date(d).toLocaleDateString("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric",
      });
    }
    // AUTH CHECK
    const token = getToken();
    const user = getUser();
    if (!token || !user) {
      window.location.href = "login.html";
    }
    // THEME
    (function () {
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        document.getElementById("themeToggle").textContent = "☀️";
      }
    })();
    document.getElementById("themeToggle").addEventListener("click", () => {
      document.body.classList.toggle("dark");
      const isDark = document.body.classList.contains("dark");
      localStorage.setItem("theme", isDark ? "dark" : "light");
      document.getElementById("themeToggle").textContent = isDark
        ? "☀️"
        : "🌙";
    });
    // SIDEBAR
    function renderSidebar() {
      const nav = document.getElementById("sidebarNav");
      const patientLinks = [
        { icon: "📊", label: "Dashboard", href: "dashboard.html" },
        { icon: "📈", label: "Progress", href: "progress.html" },
        { icon: "🏋️", label: "Exercises", href: "exercises.html" },
        { icon: "📅", label: "Appointments", href: "appointments.html" },
        { icon: "📝", label: "Feedback", href: "feedback.html" },
        { icon: "👤", label: "Profile", href: "profile.html" },
      ];
      const doctorLinks = [
        { icon: "📊", label: "Dashboard", href: "dashboard.html" },
        { icon: "👥", label: "Patients", href: "progress.html" },
        { icon: "🏋️", label: "Exercises", href: "exercises.html" },
        { icon: "📅", label: "Appointments", href: "appointments.html" },
        { icon: "📝", label: "Feedback", href: "feedback.html" },
        { icon: "👤", label: "Profile", href: "profile.html" },
      ];
      const links = user.role === "doctor" ? doctorLinks : patientLinks;
      const currentPage =
        window.location.pathname.split("/").pop() || "dashboard.html";

      nav.innerHTML = links
        .map(
          (l) => `
        <a class="sidebar-link ${currentPage === l.href ? "active" : ""}" href="${l.href}">
          <span class="sidebar-link-icon">${l.icon}</span>${l.label}
        </a>
      `,
        )
        .join("");

      document.getElementById("sidebarAvatar").textContent = user.name
        ? user.name
          .split(" ")
          .map((w) => w[0])
          .join("")
          .toUpperCase()
          .slice(0, 2)
        : "--";
      document.getElementById("sidebarName").textContent =
        user.name || "User";
      document.getElementById("sidebarRole").textContent = user.role || "—";
    }
    renderSidebar();
    document.getElementById("mobileToggle").addEventListener("click", () => {
      document.getElementById("sidebar").classList.toggle("open");
    });
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    });
    // DASHBOARD DATA
    async function loadDashboard() {
      try {
        const data = await api("/dashboard");
        document.getElementById("pageSubtitle").textContent =
          `Welcome back, ${user.name}`;

        if (data.role === "patient") renderPatientDashboard(data);
        else renderDoctorDashboard(data);
      } catch (err) {
        showToast("Failed to load dashboard: " + err.message);
        renderFallbackDashboard();
      }
    }
    function renderPatientDashboard(data) {
      const s = data.stats;

      document.getElementById("statsGrid").innerHTML = `
        <div class="stat-card">
          <div class="stat-header">
            <div class="stat-icon blue">📊</div>
            <span class="stat-badge up">↑ Active</span>
          </div>
          <div class="stat-value">${s.totalSessions}</div>
          <div class="stat-label">Total Sessions</div>
        </div>
        <div class="stat-card">
          <div class="stat-header">
            <div class="stat-icon ${s.averagePainLevel <= 4 ? "green" : "orange"}">💪</div>
            <span class="stat-badge ${s.averagePainLevel <= 4 ? "up" : "down"}">${s.averagePainLevel <= 4 ? "↓ Good" : "↑ Monitor"}</span>
          </div>
          <div class="stat-value">${s.averagePainLevel}/10</div>
          <div class="stat-label">Avg Pain Level</div>
        </div>
        <div class="stat-card">
          <div class="stat-header">
            <div class="stat-icon green">✅</div>
            <span class="stat-badge up">${s.averageCompletion >= 80 ? "★ Great" : "Keep going"}</span>
          </div>
          <div class="stat-value">${s.averageCompletion}%</div>
          <div class="stat-label">Avg Completion</div>
        </div>
        <div class="stat-card">
          <div class="stat-header">
            <div class="stat-icon purple">🏋️</div>
          </div>
          <div class="stat-value">${s.assignedExercises}</div>
          <div class="stat-label">Assigned Exercises</div>
        </div>
      `;

      // Cards
      let exerciseHtml = "";
      if (data.exercises.length === 0) {
        exerciseHtml =
          '<div class="empty-state"><div class="empty-state-icon">🏋️</div><p>No exercises assigned yet.</p></div>';
      } else {
        exerciseHtml = data.exercises
          .map(
            (ex) => `
          <div class="list-item">
            <div class="list-avatar blue">🏋️</div>
            <div class="list-info">
              <h4>${ex.title}</h4>
              <p>${ex.category} · ${ex.duration} min · ${ex.difficulty}</p>
            </div>
            <span class="list-badge confirmed">${ex.difficulty}</span>
          </div>
        `,
          )
          .join("");
      }

      let appointmentHtml = "";
      if (data.appointments.length === 0) {
        appointmentHtml =
          '<div class="empty-state"><div class="empty-state-icon">📅</div><p>No appointments scheduled.</p></div>';
      } else {
        appointmentHtml = data.appointments
          .slice(0, 5)
          .map(
            (apt) => `
          <div class="list-item">
            <div class="list-avatar orange">📅</div>
            <div class="list-info">
              <h4>${apt.doctorId?.name || "Doctor"}</h4>
              <p>${formatDate(apt.date)} · ${apt.time}</p>
            </div>
            <span class="list-badge ${apt.status}">${apt.status}</span>
          </div>
        `,
          )
          .join("");
      }

      document.getElementById("cardsGrid").innerHTML = `
        <div class="card">
          <div class="card-header">
            <div class="card-title">Assigned Exercises</div>
            <a class="card-action" href="exercises.html">View All →</a>
          </div>
          ${exerciseHtml}
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">Upcoming Appointments</div>
            <a class="card-action" href="appointments.html">View All →</a>
          </div>
          ${appointmentHtml}
        </div>
      `;

      // Progress chart
      if (data.recentProgress.length > 0) {
        const chartCard = document.createElement("div");
        chartCard.className = "card";
        chartCard.style.gridColumn = "1 / -1";
        chartCard.innerHTML = `
          <div class="card-header">
            <div class="card-title">Recovery Trend (Last 30 Days)</div>
            <a class="card-action" href="progress.html">Details →</a>
          </div>
          <div class="chart-container"><canvas id="progressChart"></canvas></div>
        `;
        document.getElementById("cardsGrid").appendChild(chartCard);
        drawChart(data.recentProgress.reverse());
      }
    }
    function renderDoctorDashboard(data) {
      const s = data.stats;

      document.getElementById("statsGrid").innerHTML = `
        <div class="stat-card">
          <div class="stat-header"><div class="stat-icon blue">👥</div></div>
          <div class="stat-value">${s.totalPatients}</div>
          <div class="stat-label">Total Patients</div>
        </div>
        <div class="stat-card">
          <div class="stat-header"><div class="stat-icon green">🏋️</div></div>
          <div class="stat-value">${s.totalExercises}</div>
          <div class="stat-label">Exercise Protocols</div>
        </div>
        <div class="stat-card">
          <div class="stat-header"><div class="stat-icon orange">📅</div></div>
          <div class="stat-value">${s.totalAppointments}</div>
          <div class="stat-label">Total Appointments</div>
        </div>
        <div class="stat-card">
          <div class="stat-header"><div class="stat-icon purple">⏳</div><span class="stat-badge ${s.pendingAppointments > 0 ? "down" : "up"}">${s.pendingAppointments > 0 ? "Action needed" : "All clear"}</span></div>
          <div class="stat-value">${s.pendingAppointments}</div>
          <div class="stat-label">Pending Appointments</div>
        </div>
      `;

      let patientHtml = "";
      if (data.patients.length === 0) {
        patientHtml =
          '<div class="empty-state"><div class="empty-state-icon">👥</div><p>No patients assigned yet.</p></div>';
      } else {
        patientHtml = data.patients
          .slice(0, 6)
          .map(
            (p) => `
          <div class="list-item">
            <div class="list-avatar blue">${p.name
                .split(" ")
                .map((w) => w[0])
                .join("")
                .toUpperCase()
                .slice(0, 2)}</div>
            <div class="list-info">
              <h4>${p.name}</h4>
              <p>${p.email}</p>
            </div>
            <span class="list-badge confirmed">Active</span>
          </div>
        `,
          )
          .join("");
      }

      let apptHtml = "";
      if (data.recentAppointments.length === 0) {
        apptHtml =
          '<div class="empty-state"><div class="empty-state-icon">📅</div><p>No appointments yet.</p></div>';
      } else {
        apptHtml = data.recentAppointments
          .slice(0, 6)
          .map(
            (a) => `
          <div class="list-item">
            <div class="list-avatar orange">📅</div>
            <div class="list-info">
              <h4>${a.patientId?.name || "Patient"}</h4>
              <p>${formatDate(a.date)} · ${a.time}</p>
            </div>
            <span class="list-badge ${a.status}">${a.status}</span>
          </div>
        `,
          )
          .join("");
      }

      document.getElementById("cardsGrid").innerHTML = `
        <div class="card">
          <div class="card-header">
            <div class="card-title">My Patients</div>
            <a class="card-action" href="progress.html">View All →</a>
          </div>
          ${patientHtml}
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">Recent Appointments</div>
            <a class="card-action" href="appointments.html">View All →</a>
          </div>
          ${apptHtml}
        </div>
      `;
    }

    function renderFallbackDashboard() {
      document.getElementById("statsGrid").innerHTML = `
        <div class="stat-card"><div class="stat-header"><div class="stat-icon blue">📊</div></div><div class="stat-value">0</div><div class="stat-label">Sessions</div></div>
        <div class="stat-card"><div class="stat-header"><div class="stat-icon green">💪</div></div><div class="stat-value">0</div><div class="stat-label">Pain Level</div></div>
        <div class="stat-card"><div class="stat-header"><div class="stat-icon orange">✅</div></div><div class="stat-value">0%</div><div class="stat-label">Completion</div></div>
        <div class="stat-card"><div class="stat-header"><div class="stat-icon purple">🏋️</div></div><div class="stat-value">0</div><div class="stat-label">Exercises</div></div>
      `;
      document.getElementById("cardsGrid").innerHTML = `
        <div class="card"><div class="empty-state"><div class="empty-state-icon">🚀</div><p>Connect your backend to see live data!</p></div></div>
      `;
    }
    function drawChart(progressData) {
      const canvas = document.getElementById("progressChart");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      const W = rect.width,
        H = rect.height;
      const padding = { top: 20, right: 20, bottom: 30, left: 40 };
      const chartW = W - padding.left - padding.right;
      const chartH = H - padding.top - padding.bottom;

      const values = progressData.map((p) => p.exerciseCompletion);
      const max = Math.max(...values, 100);
      const min = 0;

      // Grid lines
      ctx.strokeStyle = getComputedStyle(document.body)
        .getPropertyValue("--outline-variant")
        .trim();
      ctx.globalAlpha = 0.15;
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = padding.top + (chartH / 4) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(W - padding.right, y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      if (values.length < 2) return;

      // Line
      const gradient = ctx.createLinearGradient(
        0,
        padding.top,
        0,
        H - padding.bottom,
      );
      const primary = getComputedStyle(document.body)
        .getPropertyValue("--primary")
        .trim();
      gradient.addColorStop(0, primary);
      gradient.addColorStop(1, primary + "20");

      ctx.beginPath();
      values.forEach((v, i) => {
        const x = padding.left + (chartW / (values.length - 1)) * i;
        const y = padding.top + chartH - (v / max) * chartH;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = primary;
      ctx.lineWidth = 2.5;
      ctx.lineJoin = "round";
      ctx.stroke();

      // Fill area
      const lastX = padding.left + chartW;
      const firstX = padding.left;
      ctx.lineTo(lastX, H - padding.bottom);
      ctx.lineTo(firstX, H - padding.bottom);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.globalAlpha = 0.1;
      ctx.fill();
      ctx.globalAlpha = 1;

      // Dots
      values.forEach((v, i) => {
        const x = padding.left + (chartW / (values.length - 1)) * i;
        const y = padding.top + chartH - (v / max) * chartH;
        ctx.beginPath();
        ctx.arc(x, y, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = primary;
        ctx.fill();
        ctx.strokeStyle = getComputedStyle(document.body)
          .getPropertyValue("--surface-container-lowest")
          .trim();
        ctx.lineWidth = 2;
        ctx.stroke();
      });

      // Labels
      ctx.font = `11px ${getComputedStyle(document.body).getPropertyValue("--font-body").trim()}`;
      ctx.fillStyle = getComputedStyle(document.body)
        .getPropertyValue("--on-surface-variant")
        .trim();
      ctx.textAlign = "center";
      const step = Math.max(1, Math.floor(values.length / 6));
      progressData.forEach((p, i) => {
        if (i % step === 0 || i === values.length - 1) {
          const x = padding.left + (chartW / (values.length - 1)) * i;
          const label = new Date(p.date).toLocaleDateString("en-US", {
            month: "short",
            day: "numeric",
          });
          ctx.fillText(label, x, H - 8);
        }
      });
    }

    loadDashboard();
    // CHATBOT
    const chatFab = document.getElementById("chatbotFab");
    const chatWindow = document.getElementById("chatbotWindow");
    const chatClose = document.getElementById("chatbotClose");
    const chatInput = document.getElementById("chatInput");
    const chatSend = document.getElementById("chatSend");
    const chatMessages = document.getElementById("chatMessages");

    chatFab.addEventListener("click", () => {
      chatWindow.classList.toggle("open");
      if (chatWindow.classList.contains("open")) chatInput.focus();
    });
    chatClose.addEventListener("click", () =>
      chatWindow.classList.remove("open"),
    );

    async function sendChat() {
      const msg = chatInput.value.trim();
      if (!msg) return;

      // Add user bubble
      chatMessages.innerHTML += `<div class="chat-bubble user">${msg}</div>`;
      chatInput.value = "";
      chatMessages.scrollTop = chatMessages.scrollHeight;

      // Typing indicator
      const typing = document.createElement("div");
      typing.className = "typing-indicator";
      typing.innerHTML = "<span></span><span></span><span></span>";
      chatMessages.appendChild(typing);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      try {
        const data = await api("/chat", {
          method: "POST",
          body: JSON.stringify({ message: msg }),
        });
        typing.remove();
        chatMessages.innerHTML += `<div class="chat-bubble assistant">${data.message}</div>`;
      } catch (err) {
        typing.remove();
        chatMessages.innerHTML += `<div class="chat-bubble assistant">Sorry, I couldn't process that. Please try again.</div>`;
      }
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    chatSend.addEventListener("click", sendChat);
    chatInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendChat();
    });

    // Load chat history
    (async () => {
      try {
        const messages = await api("/chat");
        if (messages && messages.length > 0) {
          const recent = messages.slice(-20);
          recent.forEach((m) => {
            chatMessages.innerHTML += `<div class="chat-bubble ${m.role}">${m.content}</div>`;
          });
        }
      } catch (e) {
        /* Ignore - first time user */
      }
    })();
  </script>
</body>

</html>
