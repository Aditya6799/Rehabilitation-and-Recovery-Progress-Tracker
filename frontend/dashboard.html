<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Your personalized rehabilitation dashboard — track progress, manage exercises, and monitor recovery." />
  <title>Precision Recovery | Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>

<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo-icon">⚕</div>
        <span class="sidebar-logo-text">Precision Recovery</span>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-divider"></div>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebarAvatar">--</div>
          <div>
            <div class="sidebar-user-name" id="sidebarName">Loading...</div>
            <div class="sidebar-user-role" id="sidebarRole">—</div>
          </div>
        </div>
        <button class="sidebar-logout-btn" id="logoutBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Sign Out
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="topbar-btn mobile-toggle" id="mobileToggle" aria-label="Toggle sidebar">
            ☰
          </button>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle">Welcome back</p>
        </div>
        <div class="topbar-actions">
          <button class="topbar-btn" id="themeToggle" aria-label="Toggle dark mode">
            🌙
          </button>
        </div>
      </header>
      <div class="content" id="dashboardContent">
        <!-- Stats will be injected here -->
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width: 40%"></div>
          </div>
          <div class="stat-card">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width: 40%"></div>
          </div>
          <div class="stat-card">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width: 40%"></div>
          </div>
          <div class="stat-card">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width: 40%"></div>
          </div>
        </div>
        <div class="cards-grid" id="cardsGrid">
          <div class="card">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text"></div>
            <div class="skeleton skeleton-text" style="width: 80%"></div>
          </div>
          <div class="card">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text"></div>
            <div class="skeleton skeleton-text" style="width: 80%"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <button class="chatbot-fab" id="chatbotFab" aria-label="Open chat assistant">
    🤖
    <span class="dot"></span>
  </button>

  <div class="chatbot-window" id="chatbotWindow">
    <div class="chatbot-header">
      <div class="chatbot-header-icon">🤖</div>
      <div class="chatbot-header-info">
        <h3>Recovery AI</h3>
        <p>Your rehabilitation assistant</p>
      </div>
      <button class="chatbot-close" id="chatbotClose">✕</button>
    </div>
    <div class="chatbot-messages" id="chatMessages">
      <div class="chat-bubble assistant">
        Hello! 👋 I'm your Recovery AI assistant. Ask me anything about your
        rehabilitation journey — exercises, pain management, or recovery tips!
      </div>
    </div>
    <div class="chatbot-input">
      <input type="text" id="chatInput" placeholder="Ask about your recovery..." autocomplete="off" />
      <button id="chatSend" aria-label="Send message">➤</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

    <script src="js/dashboard.js"></script>
  </body>

</html>
