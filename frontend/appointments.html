<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Book and manage rehabilitation appointments with your healthcare provider." />
  <title>Precision Recovery | Appointments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --primary: #0059bb;
      --primary-container: #0070ea;
      --primary-fixed: #d8e2ff;
      --primary-fixed-dim: #adc7ff;
      --on-primary: #fff;
      --secondary: #405e96;
      --secondary-container: #a4c1ff;
      --tertiary: #9e3d00;
      --tertiary-container: #c64f00;
      --tertiary-fixed: #ffdbcc;
      --surface: #f7f9fc;
      --surface-container: #eceef1;
      --surface-container-low: #f2f4f7;
      --surface-container-lowest: #fff;
      --surface-container-high: #e6e8eb;
      --surface-container-highest: #e0e3e6;
      --on-surface: #191c1e;
      --on-surface-variant: #414754;
      --outline: #717786;
      --outline-variant: #c1c6d7;
      --error: #ba1a1a;
      --error-container: #ffdad6;
      --font-headline: "Manrope", sans-serif;
      --font-body: "Inter", sans-serif;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-2xl: 24px;
      --radius-full: 9999px;
      --shadow-sm: 0 2px 8px rgba(0, 89, 187, 0.04);
      --shadow-md: 0 4px 16px rgba(0, 89, 187, 0.06);
      --shadow-lg: 0 8px 32px rgba(0, 89, 187, 0.08);
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.dark {
      --primary: #adc7ff;
      --primary-container: #004493;
      --primary-fixed: #d8e2ff;
      --primary-fixed-dim: #adc7ff;
      --on-primary: #002e6b;
      --secondary: #adc7ff;
      --secondary-container: #26467c;
      --tertiary: #ffb695;
      --tertiary-container: #7c2e00;
      --tertiary-fixed: #ffdbcc;
      --surface: #111416;
      --surface-container: #1d2022;
      --surface-container-low: #191c1e;
      --surface-container-lowest: #0c0f11;
      --surface-container-high: #272a2d;
      --surface-container-highest: #323538;
      --on-surface: #e0e3e6;
      --on-surface-variant: #c1c6d7;
      --outline: #8b91a1;
      --outline-variant: #414754;
      --error: #ffb4ab;
      --error-container: #93000a;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.35);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--surface);
      color: var(--on-surface);
      transition:
        background var(--transition),
        color var(--transition);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: var(--surface-container-low);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 50;
      transition: transform var(--transition);
    }

    .sidebar-header {
      padding: 24px 24px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg,
          var(--primary),
          var(--primary-container));
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
    }

    .sidebar-logo-text {
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: 1.1rem;
    }

    .sidebar-nav {
      flex: 1;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--on-surface-variant);
      transition: all var(--transition);
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-family: var(--font-body);
    }

    .sidebar-link:hover {
      background: var(--surface-container);
      color: var(--on-surface);
    }

    .sidebar-link.active {
      background: var(--primary-fixed);
      color: var(--primary);
      font-weight: 600;
    }

    body.dark .sidebar-link.active {
      background: var(--primary-container);
      color: var(--primary-fixed-dim);
    }

    .sidebar-link-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--outline-variant);
      opacity: 0.3;
      margin: 12px 16px;
    }

    .sidebar-footer {
      padding: 16px 12px;
    }

    .sidebar-user {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      background: var(--surface-container);
    }

    .sidebar-avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg,
          var(--primary-fixed-dim),
          var(--primary-fixed));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--primary);
    }

    .sidebar-user-name {
      font-size: 0.82rem;
      font-weight: 600;
    }

    .sidebar-user-role {
      font-size: 0.7rem;
      color: var(--on-surface-variant);
      text-transform: capitalize;
    }

    .main-content {
      flex: 1;
      margin-left: 260px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .topbar-left h1 {
      font-family: var(--font-headline);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .topbar-left p {
      font-size: 0.8rem;
      color: var(--on-surface-variant);
      margin-top: 2px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--surface-container);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--on-surface-variant);
      transition: all var(--transition);
    }

    .topbar-btn:hover {
      background: var(--surface-container-high);
      color: var(--primary);
    }

    .mobile-toggle {
      display: none;
    }

    .content {
      flex: 1;
      padding: 0 32px 32px;
    }

    .page-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-primary {
      background: linear-gradient(135deg,
          var(--primary),
          var(--primary-container));
      color: #fff;
      box-shadow: var(--shadow-sm);
    }

    body.dark .btn-primary {
      color: #0a1628;
    }

    .btn-primary:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 0.78rem;
    }

    .btn-ghost {
      background: var(--surface-container);
      color: var(--on-surface-variant);
    }

    .btn-ghost:hover {
      background: var(--surface-container-high);
    }

    .btn-success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    body.dark .btn-success {
      background: #1b3a1e;
      color: #66bb6a;
    }

    .btn-danger {
      background: var(--error-container);
      color: var(--error);
    }

    .appointments-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .appt-card {
      background: var(--surface-container-lowest);
      border-radius: var(--radius-xl);
      padding: 24px;
      transition: all var(--transition);
      position: relative;
    }

    .appt-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .appt-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .appt-date-badge {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .appt-date-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-lg);
      background: var(--primary-fixed);
      color: var(--primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: var(--font-headline);
    }

    body.dark .appt-date-icon {
      background: #1a2744;
    }

    .appt-date-icon .day {
      font-size: 1.2rem;
      font-weight: 800;
      line-height: 1;
    }

    .appt-date-icon .month {
      font-size: 0.55rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .appt-status {
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: capitalize;
    }

    .appt-status.pending {
      background: #fff3e0;
      color: #e65100;
    }

    .appt-status.confirmed {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .appt-status.completed {
      background: var(--primary-fixed);
      color: var(--primary);
    }

    .appt-status.cancelled {
      background: var(--error-container);
      color: var(--error);
    }

    body.dark .appt-status.pending {
      background: #3b2500;
      color: #ffb74d;
    }

    body.dark .appt-status.confirmed {
      background: #1b3a1e;
      color: #66bb6a;
    }

    body.dark .appt-status.completed {
      background: #1a2744;
      color: var(--primary);
    }

    body.dark .appt-status.cancelled {
      background: #3c1111;
      color: #ef9a9a;
    }

    .appt-info h3 {
      font-family: var(--font-headline);
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .appt-info p {
      font-size: 0.8rem;
      color: var(--on-surface-variant);
      margin-bottom: 4px;
    }

    .appt-details {
      display: flex;
      gap: 16px;
      margin: 16px 0;
      flex-wrap: wrap;
    }

    .appt-detail {
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--on-surface-variant);
    }

    .appt-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface-container-lowest);
      border-radius: var(--radius-2xl);
      padding: 36px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }

    .modal h3 {
      font-family: var(--font-headline);
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal>p {
      font-size: 0.85rem;
      color: var(--on-surface-variant);
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--on-surface);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 0.85rem;
      background: var(--surface-container-high);
      color: var(--on-surface);
      transition: all var(--transition);
      outline: none;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      background: var(--surface-container-lowest);
      border-color: rgba(0, 89, 187, 0.3);
      box-shadow: 0 0 0 4px rgba(0, 89, 187, 0.08);
    }

    body.dark .form-input:focus,
    body.dark .form-select:focus,
    body.dark .form-textarea:focus {
      border-color: rgba(173, 199, 255, 0.3);
      box-shadow: 0 0 0 4px rgba(173, 199, 255, 0.08);
    }

    .form-select {
      appearance: none;
      cursor: pointer;
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--on-surface-variant);
      grid-column: 1/-1;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 14px 20px;
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      animation: slideIn 0.3s ease;
      max-width: 380px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .toast.error {
      background: var(--error-container);
      color: var(--error);
    }

    body.dark .toast.success {
      background: #1b3a1e;
      color: #66bb6a;
    }

    body.dark .toast.error {
      background: #3c1111;
      color: #ef9a9a;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main-content {
        margin-left: 0;
      }

      .mobile-toggle {
        display: flex;
      }

      .topbar {
        padding: 12px 20px;
      }

      .content {
        padding: 0 20px 20px;
      }

      .appointments-grid {
        grid-template-columns: 1fr;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo-icon">⚕</div>
        <span class="sidebar-logo-text">Precision Recovery</span>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-divider"></div>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebarAvatar">--</div>
          <div>
            <div class="sidebar-user-name" id="sidebarName">Loading...</div>
            <div class="sidebar-user-role" id="sidebarRole">—</div>
          </div>
        </div>
      </div>
    </aside>
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="topbar-btn mobile-toggle" id="mobileToggle" aria-label="Toggle sidebar">
            ☰
          </button>
          <h1>Appointments</h1>
          <p id="pageSubtitle">Manage your consultation schedule</p>
        </div>
        <div class="topbar-actions">
          <button class="topbar-btn" id="themeToggle" aria-label="Toggle dark mode">
            🌙
          </button>
          <button class="topbar-btn" id="logoutBtn" aria-label="Logout">
            🚪
          </button>
        </div>
      </header>
      <div class="content">
        <div class="page-actions">
          <div></div>
          <div id="patientActions"></div>
        </div>
        <div class="appointments-grid" id="appointmentsGrid">
          <div class="empty-state">
            <div class="empty-state-icon">📅</div>
            <p>Loading appointments...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Book Appointment Modal (Patient) -->
  <div class="modal-overlay" id="bookModal">
    <div class="modal">
      <h3>Book Appointment</h3>
      <p>Schedule a consultation with your rehabilitation specialist.</p>
      <form id="bookForm">
        <div class="form-group">
          <label class="form-label">Select Doctor</label>
          <select class="form-select" id="doctorSelect" required>
            <option value="">Loading doctors...</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" class="form-input" id="apptDate" required />
          </div>
          <div class="form-group">
            <label class="form-label">Time</label>
            <input type="time" class="form-input" id="apptTime" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Reason</label>
          <textarea class="form-textarea" id="apptReason" placeholder="Describe the reason for your appointment..."
            required></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeBookModal()">
            Cancel
          </button>
          <button type="submit" class="btn btn-primary">
            Book Appointment
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const API_BASE = window.location.origin + "/api";
    function getToken() {
      return localStorage.getItem("token");
    }
    function getUser() {
      try {
        return JSON.parse(localStorage.getItem("user"));
      } catch {
        return null;
      }
    }
    async function api(endpoint, options = {}) {
      const token = getToken();
      const config = {
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
        },
        ...options,
      };
      const res = await fetch(`${API_BASE}${endpoint}`, config);
      const data = await res.json();
      if (res.status === 401) {
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        window.location.href = "login.html";
        return;
      }
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }
    function showToast(msg, type = "error") {
      const c = document.getElementById("toastContainer");
      const t = document.createElement("div");
      t.className = `toast ${type}`;
      t.innerHTML = `${type === "success" ? "✓" : "⚠"} ${msg}`;
      c.appendChild(t);
      setTimeout(() => {
        t.style.opacity = "0";
        setTimeout(() => t.remove(), 300);
      }, 4000);
    }
    function formatDate(d) {
      return new Date(d).toLocaleDateString("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric",
      });
    }

    const token = getToken();
    const user = getUser();
    if (!token || !user) window.location.href = "login.html";

    (function () {
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        document.getElementById("themeToggle").textContent = "☀️";
      }
    })();
    document.getElementById("themeToggle").addEventListener("click", () => {
      document.body.classList.toggle("dark");
      const d = document.body.classList.contains("dark");
      localStorage.setItem("theme", d ? "dark" : "light");
      document.getElementById("themeToggle").textContent = d ? "☀️" : "🌙";
    });

    function renderSidebar() {
      const nav = document.getElementById("sidebarNav");
      const pLinks = [
        { icon: "📊", label: "Dashboard", href: "dashboard.html" },
        { icon: "📈", label: "Progress", href: "progress.html" },
        { icon: "🏋️", label: "Exercises", href: "exercises.html" },
        { icon: "📅", label: "Appointments", href: "appointments.html" },
        { icon: "👤", label: "Profile", href: "profile.html" },
      ];
      const dLinks = [
        { icon: "📊", label: "Dashboard", href: "dashboard.html" },
        { icon: "👥", label: "Patients", href: "progress.html" },
        { icon: "🏋️", label: "Exercises", href: "exercises.html" },
        { icon: "📅", label: "Appointments", href: "appointments.html" },
        { icon: "👤", label: "Profile", href: "profile.html" },
      ];
      const links = user.role === "doctor" ? dLinks : pLinks;
      const cur = window.location.pathname.split("/").pop();
      nav.innerHTML = links
        .map(
          (l) =>
            `<a class="sidebar-link ${cur === l.href ? "active" : ""}" href="${l.href}"><span class="sidebar-link-icon">${l.icon}</span>${l.label}</a>`,
        )
        .join("");
      document.getElementById("sidebarAvatar").textContent = user.name
        ? user.name
          .split(" ")
          .map((w) => w[0])
          .join("")
          .toUpperCase()
          .slice(0, 2)
        : "--";
      document.getElementById("sidebarName").textContent = user.name;
      document.getElementById("sidebarRole").textContent = user.role;
    }
    renderSidebar();
    document
      .getElementById("mobileToggle")
      .addEventListener("click", () =>
        document.getElementById("sidebar").classList.toggle("open"),
      );
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    });

    // Patient: show book button & load doctors
    if (user.role === "patient") {
      document.getElementById("patientActions").innerHTML =
        '<button class="btn btn-primary" onclick="openBookModal()">＋ Book Appointment</button>';
      loadDoctors();
    }

    async function loadDoctors() {
      try {
        const docs = await api("/doctors");
        const sel = document.getElementById("doctorSelect");
        sel.innerHTML =
          '<option value="">— Select a doctor —</option>' +
          docs
            .map(
              (d) =>
                `<option value="${d._id}">${d.name}${d.specialization ? " — " + d.specialization : ""}</option>`,
            )
            .join("");
      } catch (err) {
        showToast("Failed to load doctors list");
      }
    }

    async function loadAppointments() {
      try {
        const appts = await api("/appointments");
        renderAppointments(appts);
      } catch (err) {
        document.getElementById("appointmentsGrid").innerHTML =
          '<div class="empty-state"><div class="empty-state-icon">📅</div><p>Failed to load appointments.</p></div>';
      }
    }

    function renderAppointments(appts) {
      const grid = document.getElementById("appointmentsGrid");
      if (!appts || appts.length === 0) {
        grid.innerHTML =
          '<div class="empty-state"><div class="empty-state-icon">📅</div><p>No appointments yet. ' +
          (user.role === "patient"
            ? "Book your first consultation!"
            : "Patients will appear here when they book.") +
          "</p></div>";
        return;
      }
      grid.innerHTML = appts
        .map((a) => {
          const d = new Date(a.date);
          const personName =
            user.role === "patient"
              ? a.doctorId?.name || "Doctor"
              : a.patientId?.name || "Patient";
          const personLabel = user.role === "patient" ? "Doctor" : "Patient";
          return `
        <div class="appt-card">
          <div class="appt-card-top">
            <div class="appt-date-badge">
              <div class="appt-date-icon">
                <span class="day">${d.getDate()}</span>
                <span class="month">${d.toLocaleDateString("en-US", { month: "short" })}</span>
              </div>
              <div class="appt-info">
                <h3>${personName}</h3>
                <p>${personLabel}${a.doctorId?.specialization ? " · " + a.doctorId.specialization : ""}</p>
              </div>
            </div>
            <span class="appt-status ${a.status}">${a.status}</span>
          </div>
          <div class="appt-details">
            <div class="appt-detail">🕐 ${a.time}</div>
            <div class="appt-detail">📋 ${a.reason}</div>
          </div>
          ${user.role === "doctor" && a.status === "pending"
              ? `
            <div class="appt-actions">
              <button class="btn btn-sm btn-success" onclick="updateStatus('${a._id}','confirmed')">✓ Confirm</button>
              <button class="btn btn-sm btn-primary" onclick="updateStatus('${a._id}','completed')">✔ Complete</button>
              <button class="btn btn-sm btn-danger" onclick="updateStatus('${a._id}','cancelled')">✕ Cancel</button>
            </div>
          `
              : ""
            }
          ${user.role === "doctor" && a.status === "confirmed"
              ? `
            <div class="appt-actions">
              <button class="btn btn-sm btn-primary" onclick="updateStatus('${a._id}','completed')">✔ Mark Completed</button>
              <button class="btn btn-sm btn-danger" onclick="updateStatus('${a._id}','cancelled')">✕ Cancel</button>
            </div>
          `
              : ""
            }
        </div>`;
        })
        .join("");
    }

    async function updateStatus(id, status) {
      try {
        await api(`/appointments/${id}`, {
          method: "PUT",
          body: JSON.stringify({ status }),
        });
        showToast(`Appointment ${status}!`, "success");
        loadAppointments();
      } catch (err) {
        showToast(err.message);
      }
    }

    function openBookModal() {
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      document.getElementById("apptDate").value = tomorrow
        .toISOString()
        .split("T")[0];
      document.getElementById("apptDate").min = tomorrow
        .toISOString()
        .split("T")[0];
      document.getElementById("bookModal").classList.add("open");
    }
    function closeBookModal() {
      document.getElementById("bookModal").classList.remove("open");
    }

    document
      .getElementById("bookForm")
      .addEventListener("submit", async (e) => {
        e.preventDefault();
        const doctorId = document.getElementById("doctorSelect").value;
        const date = document.getElementById("apptDate").value;
        const time = document.getElementById("apptTime").value;
        const reason = document.getElementById("apptReason").value;
        if (!doctorId) {
          showToast("Please select a doctor");
          return;
        }
        try {
          await api("/appointments", {
            method: "POST",
            body: JSON.stringify({ doctorId, date, time, reason }),
          });
          showToast("Appointment booked!", "success");
          closeBookModal();
          loadAppointments();
        } catch (err) {
          showToast(err.message);
        }
      });

    document.getElementById("bookModal").addEventListener("click", (e) => {
      if (e.target === document.getElementById("bookModal")) closeBookModal();
    });

    loadAppointments();
  </script>
</body>

</html>
