<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Book and manage rehabilitation appointments with your healthcare provider." />
  <title>Precision Recovery | Appointments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
    <link rel="stylesheet" href="css/appointments.css" />
  </head>

<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo-icon">⚕</div>
        <span class="sidebar-logo-text">Precision Recovery</span>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-divider"></div>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebarAvatar">--</div>
          <div>
            <div class="sidebar-user-name" id="sidebarName">Loading...</div>
            <div class="sidebar-user-role" id="sidebarRole">—</div>
          </div>
        </div>
        <button class="sidebar-logout-btn" id="logoutBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Sign Out
        </button>
      </div>
    </aside>
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="topbar-btn mobile-toggle" id="mobileToggle" aria-label="Toggle sidebar">
            ☰
          </button>
          <h1>Appointments</h1>
          <p id="pageSubtitle">Manage your consultation schedule</p>
        </div>
        <div class="topbar-actions">
          <button class="topbar-btn" id="themeToggle" aria-label="Toggle dark mode">
            🌙
          </button>
        </div>
      </header>
      <div class="content">
        <div class="page-actions">
          <div></div>
          <div id="patientActions"></div>
        </div>
        <div class="appointments-grid" id="appointmentsGrid">
          <div class="empty-state">
            <div class="empty-state-icon">📅</div>
            <p>Loading appointments...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Book Appointment Modal (Patient) -->
  <div class="modal-overlay" id="bookModal">
    <div class="modal">
      <h3>Book Appointment</h3>
      <p>Schedule a consultation with your rehabilitation specialist.</p>
      <form id="bookForm">
        <div class="form-group">
          <label class="form-label">Select Doctor</label>
          <select class="form-select" id="doctorSelect" required onchange="onSlotFilterChange()">
            <option value="">Loading doctors...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" class="form-input" id="apptDate" required onchange="onSlotFilterChange()" />
        </div>
        <div class="form-group">
          <label class="form-label">Available Time Slots</label>
          <select class="form-select" id="apptTimeSlot" required>
            <option value="">Select doctor &amp; date first</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Reason</label>
          <textarea class="form-textarea" id="apptReason" placeholder="Describe the reason for your appointment..."
            required></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeBookModal()">
            Cancel
          </button>
          <button type="submit" class="btn btn-primary">
            Book Appointment
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

    <script src="js/appointments.js"></script>
  </body>

</html>
